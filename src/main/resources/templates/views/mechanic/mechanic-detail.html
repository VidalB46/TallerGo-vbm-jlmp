<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Ficha de Mecánico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- Navbar CSS compartido -->
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.mec-detail-page {
        font-family: 'Inter', sans-serif;
        background: #0d0d0d; color: #eee;
        display: block !important; height: auto !important; min-height: 100vh;
    }
    body.mec-detail-page > nav,
    body.mec-detail-page > section,
    body.mec-detail-page > div,
    body.mec-detail-page > footer { flex: unset !important; width: 100%; }

    /* ── HERO ── */
    .detail-hero {
        margin-top: 64px; height: 280px;
        position: relative; overflow: hidden;
        display: flex; align-items: flex-end; justify-content: center;
        padding-bottom: 2rem;
    }
    .detail-hero-bg {
        position: absolute; inset: 0;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a0808 60%, #0a0a0a 100%);
    }
    /* Avatar icono */
    .detail-hero-avatar {
        width: 100px; height: 100px; border-radius: 50%;
        background: rgba(255,255,255,0.06);
        border: 3px solid rgba(192,57,43,0.5);
        box-shadow: 0 0 32px rgba(192,57,43,0.25);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 0.2rem;
    }
    .detail-hero-avatar i { font-size: 4rem; color: rgba(255,255,255,0.25); line-height: 1; display: block; }
    .detail-hero-inner {
        position: relative; z-index: 1; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
    }
    .detail-hero-inner h1 {
        font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900;
        color: #fff; letter-spacing: -0.5px;
    }
    .detail-hero-specialty {
        display: inline-flex; align-items: center; gap: 0.35rem;
        background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3);
        color: #e74c3c; font-size: 0.75rem; font-weight: 700;
        padding: 0.3rem 0.85rem; border-radius: 20px; letter-spacing: 0.8px;
        text-transform: uppercase;
    }

    /* ── CONTENT ── */
    .detail-main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; margin-bottom: 2rem; }
    @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-card {
        background: #141414; border: 1px solid #1e1e1e;
        border-radius: 14px; padding: 1.6rem;
    }
    .detail-card h3 {
        font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.35);
        text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 1.2rem;
        display: flex; align-items: center; gap: 0.5rem;
    }
    .detail-card h3 i { color: #c0392b; font-size: 0.85rem; }
    .detail-row {
        display: flex; flex-direction: column;
        padding: 0.75rem 0; border-bottom: 1px solid #1a1a1a;
    }
    .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-label { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 0.25rem; }
    .detail-value { font-size: 0.9rem; font-weight: 500; color: #fff; }
    .detail-value a { color: #c0392b; text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .detail-value a:hover { color: #e74c3c; }
    .badge-specialty {
        display: inline-flex; align-items: center; gap: 0.3rem;
        background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.25);
        color: #e74c3c; font-size: 0.78rem; font-weight: 700;
        padding: 0.25rem 0.7rem; border-radius: 20px;
    }

    /* ── ACCIONES ── */
    .detail-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .btn-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.1); font-size: 0.82rem; font-weight: 600;
        padding: 0.6rem 1.2rem; border-radius: 9px; text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .btn-workshop-link {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: rgba(192,57,43,0.1); color: #e74c3c;
        border: 1px solid rgba(192,57,43,0.25); font-size: 0.82rem; font-weight: 600;
        padding: 0.6rem 1.2rem; border-radius: 9px; text-decoration: none; transition: all 0.2s;
    }
    .btn-workshop-link:hover { background: rgba(192,57,43,0.2); color: #fff; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body class="mec-detail-page">

<!-- Navbar compartido -->
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<!-- ══ HERO ══ -->
<section class="detail-hero">
    <div class="detail-hero-bg"></div>
    <div class="detail-hero-inner">
        <div class="detail-hero-avatar">
            <i class="bi bi-person-circle"></i>
        </div>
        <h1 th:text="${mechanic.name}">Nombre del Mecánico</h1>
        <div class="detail-hero-specialty">
            <i class="bi bi-wrench-adjustable"></i>
            <span th:text="${mechanic.specialty}">Especialidad</span>
        </div>
    </div>
</section>

<!-- ══ CONTENT ══ -->
<div class="detail-main">

    <div class="detail-grid">
        <!-- Información personal -->
        <div class="detail-card" style="animation: fadeUp 0.5s ease both;">
            <h3><i class="bi bi-person-badge"></i> Información Personal</h3>
            <div class="detail-row">
                <span class="detail-label">ID Empleado</span>
                <span class="detail-value" th:text="'#' + ${mechanic.id}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Nombre Completo</span>
                <span class="detail-value" th:text="${mechanic.name}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Especialidad</span>
                <span class="detail-value">
                    <span class="badge-specialty">
                        <i class="bi bi-tools"></i>
                        <span th:text="${mechanic.specialty}">—</span>
                    </span>
                </span>
            </div>
        </div>

        <!-- Taller asignado -->
        <div class="detail-card" style="animation: fadeUp 0.5s ease 0.1s both;" th:if="${mechanic.workshop != null}">
            <h3><i class="bi bi-building"></i> Taller Asignado</h3>
            <div class="detail-row">
                <span class="detail-label">Nombre del Taller</span>
                <span class="detail-value">
                    <a th:href="@{/workshops/detail(id=${mechanic.workshop.id})}" th:text="${mechanic.workshop.name}">—</a>
                </span>
            </div>
            <div class="detail-row">
                <span class="detail-label">NIF</span>
                <span class="detail-value" th:text="${mechanic.workshop.nif}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Dirección</span>
                <span class="detail-value" th:text="${mechanic.workshop.location}">—</span>
            </div>
        </div>

        <div class="detail-card" style="animation: fadeUp 0.5s ease 0.1s both;" th:unless="${mechanic.workshop != null}">
            <h3><i class="bi bi-building-x"></i> Taller Asignado</h3>
            <p style="color:rgba(255,255,255,0.3);font-size:0.85rem;padding-top:0.5rem;">Sin taller asignado.</p>
        </div>
    </div>

    <!-- Acciones -->
    <div class="detail-actions" style="animation: fadeUp 0.5s ease 0.2s both;">
        <a th:href="@{/mechanics}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Volver a mecánicos
        </a>
        <a th:if="${mechanic.workshop != null}"
           th:href="@{/workshops/detail(id=${mechanic.workshop.id})}"
           class="btn-workshop-link">
            <i class="bi bi-building-check"></i> Ver taller completo
        </a>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    const nav = document.getElementById('tgoNav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));
</script>

</body>
</html>
