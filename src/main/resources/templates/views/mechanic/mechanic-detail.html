<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mecánico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.mec-detail-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    body.mec-detail-page > nav, body.mec-detail-page > div, body.mec-detail-page > main, body.mec-detail-page > footer { flex: unset !important; width: 100%; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .detail-main { max-width: 860px; margin: 2.5rem auto; padding: 0 2rem 5rem; animation: fadeUp 0.5s ease both; display: flex; flex-direction: column; gap: 1.5rem; }
    .detail-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .detail-card-visual { height: 110px; background: linear-gradient(135deg, #1a1a1a 0%, #111 100%); display: flex; align-items: center; justify-content: center; }
    .detail-card-visual i { font-size: 3.5rem; color: rgba(255,255,255,0.08); }
    .detail-card-body { padding: 2rem 2.5rem; }
    .mec-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem; padding-bottom: 1.5rem; border-bottom: 1.5px solid #f0f0f0; }
    .mec-name { font-size: 1.4rem; font-weight: 900; color: #111; display: flex; align-items: center; gap: 0.5rem; }
    .mec-name i { color: #c0392b; }
    .badge-specialty { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(192,57,43,0.07); border: 1.5px solid rgba(192,57,43,0.15); border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 700; color: #c0392b; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .detail-field label { font-size: 0.68rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.25rem; }
    .detail-field span { font-size: 0.92rem; font-weight: 600; color: #111; display: flex; align-items: center; gap: 0.4rem; }
    .detail-field span i { color: #c0392b; }
    .workshop-card-header { padding: 1.2rem 1.8rem; border-bottom: 1.5px solid #f0f0f0; display: flex; align-items: center; gap: 0.5rem; }
    .workshop-card-header i { color: #c0392b; }
    .workshop-card-header span { font-size: 0.9rem; font-weight: 700; color: #111; }
    .workshop-info { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .workshop-info a { font-size: 1rem; font-weight: 800; color: #111; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .workshop-info a:hover { color: #c0392b; }
    .workshop-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .workshop-meta span { font-size: 0.83rem; color: #777; display: flex; align-items: center; gap: 0.3rem; }
    .workshop-meta i { color: #c0392b; font-size: 0.8rem; }
    .no-workshop { padding: 2rem; text-align: center; color: #bbb; font-size: 0.88rem; }
    .detail-card-footer { padding: 1.2rem 2.5rem; border-top: 1.5px solid #f0f0f0; display: flex; gap: 0.75rem; }
    .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
    .btn-back:hover { background: #eaeaea; color: #111; }
    .btn-edit { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(52,152,219,0.09); color: #2980b9; border: 1.5px solid rgba(52,152,219,0.2); font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; transition: all 0.2s; }
    .btn-edit:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .detail-main { padding: 0 1rem 3rem; } .detail-grid { grid-template-columns: 1fr; } .detail-card-body { padding: 1.5rem; } .detail-card-footer { padding: 1rem 1.5rem; } }
</style>
</head>
<body class="mec-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('mechanics')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Personal</div>
        <h1 th:text="${mechanic.name}">Mecánico</h1>
        <p>Ficha completa del mecánico.</p>
    </div>
</div>

<main class="detail-main">
    <div class="detail-card">
        <div class="detail-card-visual"><i class="bi bi-person-workspace"></i></div>
        <div class="detail-card-body">
            <div class="mec-header">
                <div class="mec-name"><i class="bi bi-person-badge"></i><span th:text="${mechanic.name}"></span></div>
                <span class="badge-specialty" th:if="${mechanic.specialty}"><i class="bi bi-tools"></i><span th:text="${mechanic.specialty}"></span></span>
            </div>
            <div class="detail-grid">
                <div class="detail-field">
                    <label>ID</label>
                    <span><i class="bi bi-hash"></i><span th:text="${mechanic.id}"></span></span>
                </div>
                <div class="detail-field">
                    <label>Especialidad</label>
                    <span><i class="bi bi-tools"></i><span th:text="${mechanic.specialty} ?: 'N/A'"></span></span>
                </div>
            </div>
        </div>
        <div class="detail-card-footer">
            <a th:href="@{/mechanics}" class="btn-back"><i class="bi bi-arrow-left"></i> Volver</a>
            <a th:href="@{/mechanics/edit(id=${mechanic.id})}" class="btn-edit" sec:authorize="hasRole('ADMIN')"><i class="bi bi-pencil"></i> Editar</a>
        </div>
    </div>

    <div class="detail-card" th:if="${mechanic.workshop != null}">
        <div class="workshop-card-header"><i class="bi bi-building"></i><span>Taller asignado</span></div>
        <div class="workshop-info">
            <a th:href="@{/workshops/detail(id=${mechanic.workshop.id})}"><i class="bi bi-building-fill"></i><span th:text="${mechanic.workshop.name}"></span></a>
            <div class="workshop-meta">
                <span><i class="bi bi-card-text"></i><span th:text="${mechanic.workshop.nif}"></span></span>
                <span><i class="bi bi-geo-alt"></i><span th:text="${mechanic.workshop.location}"></span></span>
            </div>
        </div>
    </div>

    <div class="detail-card" th:unless="${mechanic.workshop != null}">
        <div class="no-workshop"><i class="bi bi-building-x" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>Este mecánico no está asignado a ningún taller.</div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
