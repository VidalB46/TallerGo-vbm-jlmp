<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mecánico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.mec-form-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .form-wrap { max-width: 760px; margin: 0 auto; padding: 2.5rem 2rem 5rem; animation: fadeUp 0.5s ease both; }
    .form-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .form-card-visual { height: 110px; background: linear-gradient(135deg, #1a1a1a 0%, #111 100%); display: flex; align-items: center; justify-content: center; }
    .form-card-visual i { font-size: 3.5rem; color: rgba(255,255,255,0.08); }
    .form-card-body { padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.72rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.3rem; }
    .form-group label i { color: #c0392b; }
    .form-group input, .form-group select { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e8e8e8; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 500; color: #111; background: #fafafa; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.08); background: #fff; }
    .form-card-footer { padding: 1.2rem 2.5rem; border-top: 1.5px solid #f0f0f0; display: flex; gap: 0.75rem; }
    .btn-cancel { display: inline-flex; align-items: center; gap: 0.4rem; background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
    .btn-cancel:hover { background: #eaeaea; color: #111; }
    .btn-save { display: inline-flex; align-items: center; gap: 0.4rem; background: #c0392b; color: #fff; border: none; font-size: 0.85rem; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .btn-save:hover { background: #a93226; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .form-wrap { padding: 0 1rem 3rem; } .form-card-body { padding: 1.5rem; } .form-card-footer { padding: 1rem 1.5rem; } }
</style>
</head>
<body class="mec-form-page">

<nav th:replace="~{fragments/navbar :: navbar('mechanics')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Personal</div>
        <h1>Nuevo Mecánico</h1>
        <p>Rellena los datos para registrar un nuevo mecánico.</p>
    </div>
</div>

<div class="form-wrap">
    <div class="form-card">
        <div class="form-card-visual"><i class="bi bi-person-workspace"></i></div>
        <form th:action="@{/mechanics/insert}" th:object="${mechanic}" method="post">
            <div class="form-card-body">
                <div class="form-group">
                    <label><i class="bi bi-person"></i> Nombre</label>
                    <input type="text" th:field="*{name}" placeholder="Nombre del mecánico" required/>
                </div>
                <div class="form-group">
                    <label><i class="bi bi-tools"></i> Especialidad</label>
                    <input type="text" th:field="*{specialty}" placeholder="Ej: Motor, Electricidad, Carrocería"/>
                </div>
                <div class="form-group">
                    <label><i class="bi bi-building"></i> Taller</label>
                    <select th:field="*{workshopId}">
                        <option value="">— Sin asignar —</option>
                        <option th:each="ws : ${listWorkshops}"
                                th:value="${ws.id}"
                                th:text="${ws.name}"></option>
                    </select>
                </div>
            </div>
            <div class="form-card-footer">
                <a th:href="@{/mechanics}" class="btn-cancel"><i class="bi bi-x-lg"></i> Cancelar</a>
                <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Guardar</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
