<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mecánico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="mec-form-page">

<nav th:replace="~{fragments/navbar :: navbar('mechanics')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Personal</div>
        <h1>Nuevo Mecánico</h1>
        <p>Rellena los datos para registrar un nuevo mecánico.</p>
    </div>
</div>

<div class="form-wrap">
    <div class="form-card">
        <div class="form-card-visual"><i class="bi bi-person-workspace"></i></div>
        <form th:action="@{/mechanics/insert}" th:object="${mechanic}" method="post">
            <div class="form-card-body">
                <div class="form-group">
                    <label><i class="bi bi-person"></i> Nombre</label>
                    <input type="text" th:field="*{name}" placeholder="Nombre del mecánico" required/>
                </div>
                <div class="form-group">
                    <label><i class="bi bi-tools"></i> Especialidad</label>
                    <input type="text" th:field="*{specialty}" placeholder="Ej: Motor, Electricidad, Carrocería"/>
                </div>
                <div class="form-group">
                    <label><i class="bi bi-building"></i> Taller</label>
                    <select th:field="*{workshopId}">
                        <option value="">— Sin asignar —</option>
                        <option th:each="ws : ${listWorkshops}"
                                th:value="${ws.id}"
                                th:text="${ws.name}"></option>
                    </select>
                </div>
            </div>
            <div class="form-card-footer">
                <a th:href="@{/mechanics}" class="btn-cancel"><i class="bi bi-x-lg"></i> Cancelar</a>
                <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Guardar</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
