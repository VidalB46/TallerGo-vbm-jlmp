<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (#{msg.title} + ' - ' + #{msg.mecanico.team.title})}"></head>
<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="list-page">
    <div class="list-card">

        <h1 th:text="#{msg.mecanico.team.title}">Equipo de Mecánicos</h1>

        <a th:href="@{/mechanics/new}" class="btn btn-success mb-3" th:text="#{msg.mecanico.action.hire}">Contratar Mecánico</a>

        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th th:text="#{msg.mecanico.list.field.nombre}">Nombre</th>
                <th th:text="#{msg.mecanico.list.field.especialidad}">Especialidad</th>
                <th th:text="#{msg.mecanico.list.field.tallerAsignado}">Taller Asignado</th>
                <th th:text="#{msg.mecanico.list.field.acciones}">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${page.content}">
                <td th:text="${m.name}"></td>
                <td th:text="${m.specialty}"></td>
                <td th:text="${m.workshopName}"></td>
                <td>
                    <form th:action="@{/mechanics/delete}" method="post" class="d-inline">
                        <input type="hidden" name="id" th:value="${m.id}"/>

                        <button type="submit"
                                class="btn btn-sm btn-danger"
                                th:onclick="'return confirm(\'' + #{msg.mecanico.delete.confirm} + '\');'"
                                th:text="#{msg.mecanico.action.fire}">
                            Despedir
                        </button>

                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
