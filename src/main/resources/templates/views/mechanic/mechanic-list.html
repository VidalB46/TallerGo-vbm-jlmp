<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mecánicos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- Navbar CSS compartido -->
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.mechanics-page {
        font-family: 'Inter', sans-serif;
        background: #f4f4f6;
        color: #1a1a1a;
        display: block !important;
        height: auto !important;
        min-height: 100vh;
    }
    body.mechanics-page > nav,
    body.mechanics-page > section,
    body.mechanics-page > div,
    body.mechanics-page > footer { flex: unset !important; width: 100%; }

    /* ── NAVBAR: fondo oscuro siempre visible ── */
    .tgo-nav {
        background: rgba(10,10,10,0.93) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    /* ── HERO BANNER ── */
    .mec-hero {
        margin-top: 0;
        padding-top: calc(5rem + 64px);
        padding-bottom: 4rem;
        height: auto;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a0808 50%, #0a0a0a 100%);
        display: flex; align-items: center; justify-content: center;
        text-align: center;
        position: relative; overflow: hidden;
    }
    .mec-hero::before {
        content: '';
        position: absolute; inset: 0;
        background: radial-gradient(ellipse 60% 80% at 50% 110%, rgba(192,57,43,0.18) 0%, transparent 70%);
    }
    .mec-hero-content { position: relative; z-index: 1; }
    .mec-hero-icon {
        font-size: 3rem; color: #c0392b;
        margin-bottom: 0.6rem; display: block;
        filter: drop-shadow(0 0 18px rgba(192,57,43,0.45));
    }
    .mec-hero-content h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 900; color: #fff; letter-spacing: -1px; line-height: 1.1;
    }
    .mec-hero-content h1 span { color: #c0392b; }
    .mec-hero-content p {
        margin-top: 0.5rem; color: rgba(255,255,255,0.45);
        font-size: 0.9rem;
    }

    /* ── MAIN ── */
    .mec-main { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* ── TOOLBAR ── */
    .mec-toolbar {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
    }
    .mec-toolbar h2 { font-size: 1rem; font-weight: 600; color: #888; }
    .mec-toolbar h2 span { color: #111; font-weight: 800; }
    .btn-new-mec {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #c0392b; color: #fff; font-size: 0.82rem; font-weight: 700;
        text-decoration: none; padding: 0.55rem 1.2rem; border-radius: 8px;
        transition: background 0.2s, transform 0.15s;
    }
    .btn-new-mec:hover { background: #a93226; transform: translateY(-1px); color: #fff; }

    /* ── CARDS GRID ── */
    .mec-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.4rem;
    }
    @media (max-width: 1100px) { .mec-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .mec-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px)  { .mec-grid { grid-template-columns: 1fr; } }

    .mec-card {
        background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 14px;
        overflow: hidden; display: flex; flex-direction: column;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .mec-card:hover {
        transform: translateY(-5px);
        border-color: rgba(192,57,43,0.35);
        box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    /* Avatar icono */
    .mec-card-avatar {
        height: 140px; display: flex; align-items: center; justify-content: center;
        position: relative; background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
        border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .mec-card-avatar .avatar-icon {
        font-size: 5rem; color: rgba(255,255,255,0.15);
        line-height: 1; display: block;
        transition: color 0.25s, transform 0.25s;
    }
    .mec-card:hover .mec-card-avatar .avatar-icon {
        color: rgba(192,57,43,0.45); transform: scale(1.06);
    }
    .specialty-badge {
        position: absolute; bottom: 0.6rem; right: 0.6rem;
        background: rgba(192,57,43,0.85); backdrop-filter: blur(6px);
        color: #fff; font-size: 0.65rem; font-weight: 700;
        padding: 0.22rem 0.6rem; border-radius: 20px; letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    /* Card body */
    .mec-card-body { padding: 1rem 1.1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
    .mec-card-name { font-size: 0.97rem; font-weight: 700; color: #111; margin-bottom: 0.3rem; }
    .mec-card-workshop {
        display: flex; align-items: center; gap: 0.35rem;
        color: #aaa; font-size: 0.75rem; margin-bottom: 0.9rem;
    }
    .mec-card-workshop i { color: #c0392b; font-size: 0.7rem; }
    .mec-card-actions { display: flex; gap: 0.5rem; margin-top: auto; }
    .btn-detail-mec, .btn-delete-mec {
        flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
        font-size: 0.75rem; font-weight: 600; padding: 0.45rem 0.6rem; border-radius: 7px;
        text-decoration: none; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit;
    }
    .btn-detail-mec {
        background: #111; color: #fff;
        border: 1px solid #111;
    }
    .btn-detail-mec:hover { background: #333; color: #fff; }
    .btn-delete-mec {
        background: rgba(192,57,43,0.08); color: #c0392b;
        border: 1.5px solid rgba(192,57,43,0.2);
    }
    .btn-delete-mec:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    /* ── EMPTY ── */
    .mec-empty {
        grid-column: 1/-1; text-align: center; padding: 4rem 2rem;
        color: #aaa;
    }
    .mec-empty i { font-size: 3rem; display: block; margin-bottom: 0.8rem; opacity: 0.3; }

    /* ── PAGINATION ── */
    .mec-pagination {
        display: flex; align-items: center; justify-content: center;
        gap: 0.4rem; margin-top: 3rem; flex-wrap: wrap;
    }
    .mec-pagination a, .mec-pagination span {
        display: inline-flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px;
        font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: all 0.2s;
    }
    .mec-pagination a { color: #555; background: #fff; border: 1.5px solid #e0e0e0; }
    .mec-pagination a:hover { color: #c0392b; border-color: #c0392b; }
    .mec-pagination span.current { background: #c0392b; color: #fff; border: 1px solid #c0392b; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body class="mechanics-page">

<!-- Navbar compartido -->
<nav th:replace="~{fragments/navbar :: navbar('mechanics')}"></nav>

<!-- ══ HERO ══ -->
<section class="mec-hero">
    <div class="mec-hero-content">
        <i class="bi bi-person-gear mec-hero-icon"></i>
        <h1><span>Mecánicos</span></h1>
        <p>Profesionales certificados al servicio de tu vehículo</p>
    </div>
</section>

<!-- ══ CONTENT ══ -->
<div class="mec-main">

    <div class="mec-toolbar">
        <h2><span th:text="${page.totalElements}">0</span> mecánicos en nuestra red</h2>
        <a th:href="@{/mechanics/new}" class="btn-new-mec" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus-fill"></i> Añadir mecánico
        </a>
    </div>

    <div class="mec-grid">
        <div class="mec-empty" th:if="${page.content.isEmpty()}">
            <i class="bi bi-person-x"></i>
            <p>No hay mecánicos registrados todavía.</p>
        </div>

        <div class="mec-card" th:each="m,iter : ${page.content}">
            <div class="mec-card-avatar">
                <i class="bi bi-person-circle avatar-icon"></i>
                <span class="specialty-badge" th:text="${m.specialty}">Especialidad</span>
            </div>
            <div class="mec-card-body">
                <div class="mec-card-name" th:text="${m.name}">Nombre</div>
                <div class="mec-card-workshop">
                    <i class="bi bi-building"></i>
                    <span th:text="${m.workshopName}">Taller</span>
                </div>
                <div class="mec-card-actions">
                    <a th:href="@{/mechanics/detail(id=${m.id})}" class="btn-detail-mec">
                        <i class="bi bi-eye"></i> Ver ficha
                    </a>
                    <form th:action="@{/mechanics/delete}" method="post"
                          style="flex:1;display:contents;" sec:authorize="hasRole('ADMIN')">
                        <input type="hidden" name="id" th:value="${m.id}"/>
                        <button type="submit" class="btn-delete-mec"
                                onclick="return confirm('¿Confirmas eliminar a este mecánico?')">
                            <i class="bi bi-person-dash"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mec-pagination" th:if="${page.totalPages > 1}">
        <a th:href="@{/mechanics(page=${page.number - 1})}" th:if="${page.hasPreviousPage()}">
            <i class="bi bi-chevron-left"></i>
        </a>
        <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
            <span class="current" th:if="${i == page.number}" th:text="${i + 1}"></span>
            <a th:unless="${i == page.number}" th:href="@{/mechanics(page=${i})}" th:text="${i + 1}"></a>
        </th:block>
        <a th:href="@{/mechanics(page=${page.number + 1})}" th:if="${page.hasNextPage()}">
            <i class="bi bi-chevron-right"></i>
        </a>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'fadeUp 0.5s ease forwards';
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.mec-card').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.animationDelay = `${i * 0.06}s`;
        observer.observe(el);
    });
</script>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
