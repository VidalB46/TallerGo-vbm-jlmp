<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle Vehículo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.vehicle-detail-page {
        font-family: 'Inter', sans-serif;
        background: #f4f4f6;
        color: #1a1a1a;
        display: block !important;
        height: auto !important;
        min-height: 100vh;
    }
    body.vehicle-detail-page > nav,
    body.vehicle-detail-page > div,
    body.vehicle-detail-page > main,
    body.vehicle-detail-page > footer { flex: unset !important; width: 100%; }

    .tgo-nav {
        background: rgba(10,10,10,0.93) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ── */
    .page-hero {
        margin-top: 0;
        padding: calc(4rem + 64px) 2.5rem 5rem;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: '';
        position: absolute; top: -60px; right: -60px;
        width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p  { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }

    /* ── CONTENT ── */
    .detail-main {
        max-width: 900px; margin: 2.5rem auto;
        padding: 0 2rem 5rem;
        animation: fadeUp 0.5s ease both;
    }

    /* Card */
    .detail-card {
        background: #fff;
        border: 1.5px solid rgba(0,0,0,0.07);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        overflow: hidden;
    }

    /* Visual top de la card */
    .detail-card-visual {
        height: 160px;
        background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    .detail-card-visual i { font-size: 5rem; color: rgba(255,255,255,0.08); }
    .matricula-pill {
        position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
        background: #c0392b; color: #fff;
        font-size: 1rem; font-weight: 800; letter-spacing: 3px;
        padding: 0.35rem 1.4rem; border-radius: 30px;
        text-transform: uppercase; white-space: nowrap;
    }

    .detail-card-body { padding: 2rem 2.5rem; }

    /* Secciones */
    .detail-section { margin-bottom: 2rem; }
    .detail-section-title {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
        text-transform: uppercase; color: #c0392b;
        margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .detail-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
    }
    .detail-field label {
        font-size: 0.72rem; font-weight: 600; color: #aaa;
        text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.2rem;
    }
    .detail-field span {
        font-size: 0.93rem; font-weight: 600; color: #111;
        display: flex; align-items: center; gap: 0.4rem;
    }
    .detail-field span i { color: #c0392b; }
    .detail-field a {
        font-size: 0.93rem; font-weight: 600; color: #c0392b;
        text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
    }
    .detail-field a:hover { text-decoration: underline; }

    /* Footer */
    .detail-card-footer {
        padding: 1.2rem 2.5rem;
        border-top: 1.5px solid #f0f0f0;
        display: flex; gap: 0.75rem;
    }
    .btn-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600;
        padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none;
        border: 1.5px solid #e0e0e0; transition: background 0.2s, color 0.2s;
    }
    .btn-back:hover { background: #eaeaea; color: #111; }
    .btn-edit {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: rgba(52,152,219,0.09); color: #2980b9;
        border: 1.5px solid rgba(52,152,219,0.2);
        font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem;
        border-radius: 10px; text-decoration: none; transition: all 0.2s;
    }
    .btn-edit:hover { background: #2980b9; color: #fff; border-color: #2980b9; }

    @media (max-width: 640px) {
        .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; }
        .detail-main { padding: 0 1rem 3rem; }
        .detail-card-body { padding: 1.5rem; }
        .detail-card-footer { padding: 1rem 1.5rem; flex-wrap: wrap; }
        .detail-grid { grid-template-columns: 1fr 1fr; }
    }
</style>
</head>

<body class="vehicle-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('vehicles')}"></nav>

<!-- ── HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Garage</div>
        <h1>Detalle del Vehículo</h1>
        <p>Información completa sobre tu vehículo registrado.</p>
    </div>
</div>

<!-- ── CONTENT ── -->
<main class="detail-main">
    <div class="detail-card">

        <!-- Visual -->
        <div class="detail-card-visual">
            <i class="bi bi-car-front-fill"></i>
            <span class="matricula-pill" th:text="${vehicle.matricula}">0000 AAA</span>
        </div>

        <div class="detail-card-body">

            <!-- Datos del vehículo -->
            <div class="detail-section">
                <div class="detail-section-title">
                    <i class="bi bi-car-front-fill"></i> Datos del vehículo
                </div>
                <div class="detail-grid">
                    <div class="detail-field">
                        <label>Marca</label>
                        <span><i class="bi bi-tags"></i>
                            <span th:text="${vehicle.brand != null ? vehicle.brand.name : '-'}"></span>
                        </span>
                    </div>
                    <div class="detail-field">
                        <label>Modelo</label>
                        <span><i class="bi bi-car-front"></i>
                            <span th:text="${vehicle.model}"></span>
                        </span>
                    </div>
                    <div class="detail-field">
                        <label>Matrícula</label>
                        <span><i class="bi bi-card-text"></i>
                            <span th:text="${vehicle.matricula}"></span>
                        </span>
                    </div>
                    <div class="detail-field" th:if="${vehicle.year != null}">
                        <label>Año</label>
                        <span><i class="bi bi-calendar3"></i>
                            <span th:text="${vehicle.year}"></span>
                        </span>
                    </div>
                    <div class="detail-field" th:if="${vehicle.km != null}">
                        <label>Kilometraje</label>
                        <span><i class="bi bi-speedometer2"></i>
                            <span th:text="${vehicle.km + ' km'}"></span>
                        </span>
                    </div>
                    <div class="detail-field" th:if="${vehicle.color != null}">
                        <label>Color</label>
                        <span><i class="bi bi-palette"></i>
                            <span th:text="${vehicle.color}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Marca (link) -->
            <div class="detail-section" th:if="${vehicle.brand != null}">
                <div class="detail-section-title">
                    <i class="bi bi-building"></i> Marca
                </div>
                <div class="detail-field">
                    <label>Nombre</label>
                    <a th:href="@{/brands/detail(id=${vehicle.brand.id})}">
                        <i class="bi bi-box-arrow-up-right"></i>
                        <span th:text="${vehicle.brand.name}"></span>
                    </a>
                </div>
            </div>

        </div>

        <div class="detail-card-footer">
            <a th:href="@{/vehicles}" class="btn-back">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <a th:href="@{/vehicles/edit(id=${vehicle.id})}" class="btn-edit">
                <i class="bi bi-pencil"></i> Editar
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
