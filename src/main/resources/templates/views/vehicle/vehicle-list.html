<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mis Vehículos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.vehicles-page {
        font-family: 'Inter', sans-serif;
        background: #f4f4f6;
        color: #1a1a1a;
        display: block !important;
        height: auto !important;
        min-height: 100vh;
    }
    body.vehicles-page > nav,
    body.vehicles-page > div,
    body.vehicles-page > main,
    body.vehicles-page > footer { flex: unset !important; width: 100%; }

    .tgo-nav {
        background: rgba(10,10,10,0.93) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .page-hero {
        margin-top: 0;
        padding: calc(4rem + 64px) 2.5rem 5rem;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: '';
        position: absolute; top: -60px; right: -60px;
        width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner {
        max-width: 1200px; margin: 0 auto;
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 1.5rem; position: relative; z-index: 1;
    }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero-text h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero-text p  { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .btn-new {
        display: inline-flex; align-items: center; gap: 0.5rem;
        background: linear-gradient(135deg, #c0392b, #96281b);
        color: #fff; font-weight: 700; font-size: 0.88rem;
        padding: 0.7rem 1.4rem; border-radius: 10px; text-decoration: none;
        box-shadow: 0 4px 16px rgba(192,57,43,0.35);
        transition: transform 0.2s, box-shadow 0.2s; white-space: nowrap;
    }
    .btn-new:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); color: #fff; }

    .vehicles-main {
        max-width: 1200px; margin: 2.5rem auto;
        padding: 0 2rem 5rem;
        animation: fadeUp 0.5s ease both;
    }
    .alert-error-custom {
        background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.25);
        color: #c0392b; border-radius: 10px; padding: 0.75rem 1rem;
        font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .vehicles-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.4rem;
    }
    @media (max-width: 1100px) { .vehicles-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .vehicles-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .vehicles-grid { grid-template-columns: 1fr; } }

    .vehicle-card {
        background: #fff;
        border: 1.5px solid rgba(0,0,0,0.07);
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        overflow: hidden; display: flex; flex-direction: column;
        transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        animation: fadeUp 0.5s ease both;
    }
    .vehicle-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 40px rgba(0,0,0,0.12);
        border-color: rgba(192,57,43,0.2);
    }
    .vehicle-card-top {
        height: 120px;
        background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    .vehicle-card-top i { font-size: 3.5rem; color: rgba(255,255,255,0.12); }
    .vehicle-matricula-badge {
        position: absolute; bottom: 0.6rem; left: 50%; transform: translateX(-50%);
        background: rgba(192,57,43,0.85); color: #fff; font-size: 0.7rem; font-weight: 800;
        padding: 0.2rem 0.8rem; border-radius: 20px; letter-spacing: 1.5px;
        text-transform: uppercase; white-space: nowrap;
    }
    .vehicle-card-body { padding: 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }
    .vehicle-brand { font-size: 0.7rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 1.5px; }
    .vehicle-model { font-size: 1rem; font-weight: 800; color: #111; }
    .vehicle-meta { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: #888; }
    .vehicle-meta i { color: #c0392b; font-size: 0.75rem; }

    .vehicle-card-footer {
        display: flex; gap: 0.4rem; padding: 0.9rem 1.2rem;
        border-top: 1px solid #f0f0f0;
    }
    .btn-detail-v {
        flex: 1; display: inline-flex; align-items: center; justify-content: center;
        gap: 0.35rem; background: #111; color: #fff;
        font-size: 0.75rem; font-weight: 600; padding: 0.5rem 0.6rem;
        border-radius: 8px; text-decoration: none; transition: background 0.2s;
    }
    .btn-detail-v:hover { background: #333; color: #fff; }
    .btn-edit-v {
        flex: 1; display: inline-flex; align-items: center; justify-content: center;
        gap: 0.35rem; background: rgba(52,152,219,0.09); color: #2980b9;
        border: 1.5px solid rgba(52,152,219,0.2);
        font-size: 0.75rem; font-weight: 600; padding: 0.5rem 0.6rem;
        border-radius: 8px; text-decoration: none; transition: all 0.2s;
    }
    .btn-edit-v:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    .btn-delete-v {
        display: inline-flex; align-items: center; justify-content: center;
        background: rgba(192,57,43,0.08); color: #c0392b;
        border: 1.5px solid rgba(192,57,43,0.2);
        font-size: 0.75rem; font-weight: 600; padding: 0.5rem 0.7rem;
        border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-delete-v:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    .vehicles-empty { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; }
    .vehicles-empty i { font-size: 3.5rem; display: block; margin-bottom: 1rem; color: #ddd; }
    .vehicles-empty p { font-size: 1rem; font-weight: 500; color: #aaa; margin-bottom: 1.2rem; }

    .pagination-bar {
        display: flex; justify-content: center; align-items: center;
        gap: 0.4rem; margin-top: 2.5rem; flex-wrap: wrap;
    }
    .page-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px;
        font-size: 0.85rem; font-weight: 600; text-decoration: none;
        border: 1.5px solid #e0e0e0; color: #555; background: #fff; transition: all 0.2s;
    }
    .page-btn:hover { border-color: #c0392b; color: #c0392b; }
    .page-btn.active { background: #c0392b; border-color: #c0392b; color: #fff; }
    .page-btn.disabled { opacity: 0.35; pointer-events: none; }

    @media (max-width: 640px) {
        .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; }
        .page-hero-inner { flex-direction: column; align-items: flex-start; }
        .vehicles-main { padding: 0 1rem 3rem; }
    }
</style>
</head>

<body class="vehicles-page">

<nav th:replace="~{fragments/navbar :: navbar('vehicles')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-hero-text">
            <div class="page-label">Garage</div>
            <h1>Mis Vehículos</h1>
            <p>Gestiona todos los vehículos vinculados a tu cuenta.</p>
        </div>
        <a th:href="@{/vehicles/new}" class="btn-new">
            <i class="bi bi-plus-lg"></i> Añadir Vehículo
        </a>
    </div>
</div>

<main class="vehicles-main">

    <div th:if="${errorMessage}" class="alert-error-custom">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="vehicles-grid">

        <div class="vehicles-empty" th:if="${page.empty}">
            <i class="bi bi-car-front"></i>
            <p>No tienes vehículos registrados todavía.</p>
            <a th:href="@{/vehicles/new}" class="btn-new">
                <i class="bi bi-plus-lg"></i> Añadir vehículo
            </a>
        </div>

        <div class="vehicle-card"
             th:each="vehicle, stat : ${page.content}"
             th:style="'animation-delay:' + ${stat.index * 70} + 'ms'">

            <div class="vehicle-card-top">
                <i class="bi bi-car-front-fill"></i>
                <span class="vehicle-matricula-badge" th:text="${vehicle.matricula}"></span>
            </div>

            <div class="vehicle-card-body">
                <div class="vehicle-brand" th:text="${vehicle.brandName != null ? vehicle.brandName : 'Sin marca'}"></div>
                <div class="vehicle-model" th:text="${vehicle.model}"></div>
                <div class="vehicle-meta" th:if="${vehicle.year != null}">
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${vehicle.year}"></span>
                </div>
                <div class="vehicle-meta" th:if="${vehicle.km != null}">
                    <i class="bi bi-speedometer2"></i>
                    <span th:text="${vehicle.km} + ' km'"></span>
                </div>
                <div class="vehicle-meta" th:if="${vehicle.color != null}">
                    <i class="bi bi-palette"></i>
                    <span th:text="${vehicle.color}"></span>
                </div>
            </div>

            <div class="vehicle-card-footer">
                <a th:href="@{/vehicles/detail(id=${vehicle.id})}" class="btn-detail-v">
                    <i class="bi bi-eye"></i> Ver
                </a>
                <a th:href="@{/vehicles/edit(id=${vehicle.id})}" class="btn-edit-v">
                    <i class="bi bi-pencil"></i> Editar
                </a>
                <form th:action="@{/vehicles/delete}" method="post" style="display:flex;">
                    <input type="hidden" name="id" th:value="${vehicle.id}"/>
                    <button type="submit" class="btn-delete-v"
                            onclick="return confirm('¿Eliminar este vehículo?')">
                        <i class="bi bi-trash3"></i>
                    </button>
                </form>
            </div>
        </div>

    </div>

    <nav class="pagination-bar" th:if="${page.totalPages > 1}">
        <a class="page-btn" th:classappend="${page.first} ? 'disabled'"
           th:href="@{/vehicles(page=${page.number - 1}, sort=${sortParam})}">
            <i class="bi bi-chevron-left"></i>
        </a>
        <a class="page-btn"
           th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
           th:classappend="${i == page.number} ? 'active'"
           th:href="@{/vehicles(page=${i}, sort=${sortParam})}"
           th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${page.last} ? 'disabled'"
           th:href="@{/vehicles(page=${page.number + 1}, sort=${sortParam})}">
            <i class="bi bi-chevron-right"></i>
        </a>
    </nav>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
