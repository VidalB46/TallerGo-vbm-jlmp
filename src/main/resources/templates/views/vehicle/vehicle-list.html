<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mis Vehículos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="vehicles-page">

<nav th:replace="~{fragments/navbar :: navbar('vehicles')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1.5rem;">
        <div class="page-hero-text">
            <div class="page-label">Garage</div>
            <h1>Mis Vehículos</h1>
            <p>Gestiona todos los vehículos vinculados a tu cuenta.</p>
        </div>
        <a th:href="@{/vehicles/new}" class="btn-new">
            <i class="bi bi-plus-lg"></i> Añadir Vehículo
        </a>
    </div>
</div>

<main class="vehicles-main">

    <div th:if="${errorMessage}" class="alert-error-custom">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="vehicles-grid">

        <div class="vehicles-empty" th:if="${page.empty}">
            <i class="bi bi-car-front"></i>
            <p>No tienes vehículos registrados todavía.</p>
            <a th:href="@{/vehicles/new}" class="btn-new">
                <i class="bi bi-plus-lg"></i> Añadir vehículo
            </a>
        </div>

        <div class="vehicle-card"
             th:each="vehicle, stat : ${page.content}"
             th:style="'animation-delay:' + ${stat.index * 70} + 'ms'">

            <div class="vehicle-card-top">
                <i class="bi bi-car-front-fill"></i>
                <span class="vehicle-matricula-badge" th:text="${vehicle.matricula}"></span>
            </div>

            <div class="vehicle-card-body">
                <div class="vehicle-brand" th:text="${vehicle.brandName != null ? vehicle.brandName : 'Sin marca'}"></div>
                <div class="vehicle-model" th:text="${vehicle.model}"></div>
                <div class="vehicle-meta" th:if="${vehicle.year != null}">
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${vehicle.year}"></span>
                </div>
                <div class="vehicle-meta" th:if="${vehicle.km != null}">
                    <i class="bi bi-speedometer2"></i>
                    <span th:text="${vehicle.km} + ' km'"></span>
                </div>
                <div class="vehicle-meta" th:if="${vehicle.color != null}">
                    <i class="bi bi-palette"></i>
                    <span th:text="${vehicle.color}"></span>
                </div>
            </div>

            <div class="vehicle-card-footer">
                <a th:href="@{/vehicles/detail(id=${vehicle.id})}" class="btn-detail-v">
                    <i class="bi bi-eye"></i> Ver
                </a>
                <a th:href="@{/vehicles/edit(id=${vehicle.id})}" class="btn-edit-v">
                    <i class="bi bi-pencil"></i> Editar
                </a>
                <form th:action="@{/vehicles/delete}" method="post" style="display:flex;">
                    <input type="hidden" name="id" th:value="${vehicle.id}"/>
                    <button type="submit" class="btn-delete-v"
                            onclick="return confirm('¿Eliminar este vehículo?')">
                        <i class="bi bi-trash3"></i>
                    </button>
                </form>
            </div>
        </div>

    </div>

    <nav class="pagination-bar" th:if="${page.totalPages > 1}">
        <a class="page-btn" th:classappend="${page.first} ? 'disabled'"
           th:href="@{/vehicles(page=${page.number - 1}, sort=${sortParam})}">
            <i class="bi bi-chevron-left"></i>
        </a>
        <a class="page-btn"
           th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
           th:classappend="${i == page.number} ? 'active'"
           th:href="@{/vehicles(page=${i}, sort=${sortParam})}"
           th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${page.last} ? 'disabled'"
           th:href="@{/vehicles(page=${page.number + 1}, sort=${sortParam})}">
            <i class="bi bi-chevron-right"></i>
        </a>
    </nav>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
