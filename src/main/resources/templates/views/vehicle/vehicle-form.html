<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Vehículo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="vehicle-form-page">

<nav th:replace="~{fragments/navbar :: navbar('vehicles')}"></nav>

<!-- ── HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Garage</div>
        <h1 th:text="${vehicle.id == null} ? 'Añadir Vehículo' : 'Editar Vehículo'">Vehículo</h1>
        <p th:text="${vehicle.id == null} ? 'Registra un nuevo vehículo en tu cuenta.' : 'Actualiza los datos de tu vehículo.'"></p>
    </div>
</div>

<!-- ── FORM ── -->
<main class="form-main">
    <div class="form-card">

        <form th:action="${vehicle.id == null} ? @{/vehicles/insert} : @{/vehicles/update}"
              th:object="${vehicle}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-card-body">

                <!-- Marca -->
                <div class="field-group">
                    <label for="brand"><i class="bi bi-tags"></i> Marca</label>
                    <select id="brand" th:field="*{brandId}" required>
                        <option value="">-- Selecciona una marca --</option>
                        <option th:each="br : ${listBrands}"
                                th:value="${br.id}"
                                th:text="${br.name}"></option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('brandId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{brandId}"></span>
                    </div>
                </div>

                <!-- Modelo + Matrícula -->
                <div class="field-row cols-2">
                    <div class="field-group">
                        <label for="model"><i class="bi bi-car-front"></i> Modelo</label>
                        <input type="text" id="model" th:field="*{model}"
                               placeholder="Ej: Corolla, A3, Golf..."
                               th:classappend="${#fields.hasErrors('model')} ? 'is-invalid'" required/>
                        <div class="field-error" th:if="${#fields.hasErrors('model')}">
                            <i class="bi bi-exclamation-circle"></i>
                            <span th:errors="*{model}"></span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="matricula"><i class="bi bi-card-text"></i> Matrícula</label>
                        <input type="text" id="matricula" th:field="*{matricula}"
                               placeholder="Ej: 1234 ABC"
                               th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'" required/>
                        <div class="field-error" th:if="${#fields.hasErrors('matricula')}">
                            <i class="bi bi-exclamation-circle"></i>
                            <span th:errors="*{matricula}"></span>
                        </div>
                    </div>
                </div>

                <!-- Año + KM + Color -->
                <div class="field-row cols-3">
                    <div class="field-group">
                        <label for="year"><i class="bi bi-calendar3"></i> Año</label>
                        <input type="number" id="year" th:field="*{year}"
                               placeholder="Ej: 2020" min="1900" max="2099"/>
                    </div>
                    <div class="field-group">
                        <label for="km"><i class="bi bi-speedometer2"></i> Kilometraje</label>
                        <input type="number" id="km" th:field="*{km}"
                               placeholder="Ej: 45000" min="0"/>
                    </div>
                    <div class="field-group">
                        <label for="color"><i class="bi bi-palette"></i> Color</label>
                        <input type="text" id="color" th:field="*{color}"
                               placeholder="Ej: Blanco"/>
                    </div>
                </div>

            </div>

            <div class="form-card-footer">
                <button type="submit" class="btn-submit">
                    <i th:class="${vehicle.id == null} ? 'bi bi-plus-circle' : 'bi bi-floppy'"></i>
                    <span th:text="${vehicle.id == null} ? 'Añadir vehículo' : 'Guardar cambios'"></span>
                </button>
                <a th:href="@{/vehicles}" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
