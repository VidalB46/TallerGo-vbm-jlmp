<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Vehículo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.vehicle-form-page {
        font-family: 'Inter', sans-serif;
        background: #f4f4f6;
        color: #1a1a1a;
        display: block !important;
        height: auto !important;
        min-height: 100vh;
    }
    body.vehicle-form-page > nav,
    body.vehicle-form-page > div,
    body.vehicle-form-page > main,
    body.vehicle-form-page > footer { flex: unset !important; width: 100%; }

    .tgo-nav {
        background: rgba(10,10,10,0.93) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ── */
    .page-hero {
        margin-top: 0;
        padding: calc(4rem + 64px) 2.5rem 5rem;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: '';
        position: absolute; top: -60px; right: -60px;
        width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p  { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }

    /* ── FORM CARD ── */
    .form-main {
        max-width: 760px; margin: 2.5rem auto;
        padding: 0 2rem 5rem;
        animation: fadeUp 0.5s ease both;
    }
    .form-card {
        background: #fff;
        border: 1.5px solid rgba(0,0,0,0.07);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        overflow: hidden;
    }
    .form-card-body { padding: 2rem 2.5rem; }

    /* Campos */
    .field-group { margin-bottom: 1.3rem; }
    .field-row { display: grid; gap: 1rem; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .field-group label {
        display: block; font-size: 0.78rem; font-weight: 700;
        color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;
    }
    .field-group select,
    .field-group input {
        width: 100%; font-family: 'Inter', sans-serif;
        font-size: 0.92rem; font-weight: 500; color: #111;
        background: #fafafa; border: 1.5px solid #e5e5e5;
        border-radius: 10px; padding: 0.7rem 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none; appearance: none;
    }
    .field-group select:focus,
    .field-group input:focus {
        border-color: #c0392b;
        box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
        background: #fff;
    }
    .field-group select.is-invalid,
    .field-group input.is-invalid { border-color: #c0392b; }
    .field-error {
        font-size: 0.78rem; color: #c0392b; margin-top: 0.35rem;
        display: flex; align-items: center; gap: 0.3rem;
    }

    /* Footer */
    .form-card-footer {
        padding: 1.2rem 2.5rem;
        border-top: 1.5px solid #f0f0f0;
        display: flex; gap: 0.75rem; align-items: center;
    }
    .btn-submit {
        display: inline-flex; align-items: center; gap: 0.5rem;
        background: linear-gradient(135deg, #c0392b, #96281b);
        color: #fff; font-weight: 700; font-size: 0.88rem;
        padding: 0.7rem 1.6rem; border-radius: 10px;
        border: none; cursor: pointer; font-family: inherit;
        box-shadow: 0 4px 16px rgba(192,57,43,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); }
    .btn-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600;
        padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none;
        border: 1.5px solid #e0e0e0; transition: background 0.2s, color 0.2s;
    }
    .btn-back:hover { background: #eaeaea; color: #111; }

    @media (max-width: 640px) {
        .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; }
        .form-main { padding: 0 1rem 3rem; }
        .form-card-body { padding: 1.5rem; }
        .form-card-footer { padding: 1rem 1.5rem; flex-wrap: wrap; }
        .field-row.cols-2,
        .field-row.cols-3 { grid-template-columns: 1fr; }
    }
</style>
</head>

<body class="vehicle-form-page">

<nav th:replace="~{fragments/navbar :: navbar('vehicles')}"></nav>

<!-- ── HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Garage</div>
        <h1 th:text="${vehicle.id == null} ? 'Añadir Vehículo' : 'Editar Vehículo'">Vehículo</h1>
        <p th:text="${vehicle.id == null} ? 'Registra un nuevo vehículo en tu cuenta.' : 'Actualiza los datos de tu vehículo.'"></p>
    </div>
</div>

<!-- ── FORM ── -->
<main class="form-main">
    <div class="form-card">

        <form th:action="${vehicle.id == null} ? @{/vehicles/insert} : @{/vehicles/update}"
              th:object="${vehicle}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-card-body">

                <!-- Marca -->
                <div class="field-group">
                    <label for="brand"><i class="bi bi-tags"></i> Marca</label>
                    <select id="brand" th:field="*{brandId}" required>
                        <option value="">-- Selecciona una marca --</option>
                        <option th:each="br : ${listBrands}"
                                th:value="${br.id}"
                                th:text="${br.name}"></option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('brandId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{brandId}"></span>
                    </div>
                </div>

                <!-- Modelo + Matrícula -->
                <div class="field-row cols-2">
                    <div class="field-group">
                        <label for="model"><i class="bi bi-car-front"></i> Modelo</label>
                        <input type="text" id="model" th:field="*{model}"
                               placeholder="Ej: Corolla, A3, Golf..."
                               th:classappend="${#fields.hasErrors('model')} ? 'is-invalid'" required/>
                        <div class="field-error" th:if="${#fields.hasErrors('model')}">
                            <i class="bi bi-exclamation-circle"></i>
                            <span th:errors="*{model}"></span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="matricula"><i class="bi bi-card-text"></i> Matrícula</label>
                        <input type="text" id="matricula" th:field="*{matricula}"
                               placeholder="Ej: 1234 ABC"
                               th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'" required/>
                        <div class="field-error" th:if="${#fields.hasErrors('matricula')}">
                            <i class="bi bi-exclamation-circle"></i>
                            <span th:errors="*{matricula}"></span>
                        </div>
                    </div>
                </div>

                <!-- Año + KM + Color -->
                <div class="field-row cols-3">
                    <div class="field-group">
                        <label for="year"><i class="bi bi-calendar3"></i> Año</label>
                        <input type="number" id="year" th:field="*{year}"
                               placeholder="Ej: 2020" min="1900" max="2099"/>
                    </div>
                    <div class="field-group">
                        <label for="km"><i class="bi bi-speedometer2"></i> Kilometraje</label>
                        <input type="number" id="km" th:field="*{km}"
                               placeholder="Ej: 45000" min="0"/>
                    </div>
                    <div class="field-group">
                        <label for="color"><i class="bi bi-palette"></i> Color</label>
                        <input type="text" id="color" th:field="*{color}"
                               placeholder="Ej: Blanco"/>
                    </div>
                </div>

            </div>

            <div class="form-card-footer">
                <button type="submit" class="btn-submit">
                    <i th:class="${vehicle.id == null} ? 'bi bi-plus-circle' : 'bi bi-floppy'"></i>
                    <span th:text="${vehicle.id == null} ? 'Añadir vehículo' : 'Guardar cambios'"></span>
                </button>
                <a th:href="@{/vehicles}" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
