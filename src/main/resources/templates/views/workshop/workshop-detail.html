<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle Taller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.ws-detail-page {
        display: block !important; height: auto !important;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #f4f4f6; color: #1a1a1a;
    }
    body.ws-detail-page > nav,
    body.ws-detail-page > div,
    body.ws-detail-page > main,
    body.ws-detail-page > footer { flex: unset !important; width: 100%; }

    @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.45); }
        50%       { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAVBAR ── */

    /* ── PAGE HERO ── */
    .page-hero {
        margin-top: 64px;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        padding: 3rem 2.5rem 2.5rem; position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: ''; position: absolute; top: -60px; right: -60px;
        width: 280px; height: 280px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner {
        max-width: 900px; margin: 0 auto;
        position: relative; z-index: 1;
    }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero h1 {
        font-size: 1.9rem; font-weight: 800; color: #fff;
        margin-bottom: 0.3rem;
    }
    .page-hero .hero-id {
        font-size: 0.8rem; color: rgba(255,255,255,0.35);
        font-weight: 500; letter-spacing: 0.5px;
    }

    /* ── MAIN ── */
    .detail-main {
        max-width: 900px; margin: 2.5rem auto 4rem;
        padding: 0 2rem;
        animation: fadeUp 0.5s ease both;
    }

    /* ── CARDS ── */
    .detail-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
        margin-bottom: 1.5rem;
    }
    .detail-card {
        background: #fff; border-radius: 16px;
        border: 1.5px solid rgba(0,0,0,0.07);
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        padding: 1.8rem;
    }
    .detail-card h2 {
        font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
        text-transform: uppercase; color: #c0392b;
        margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .detail-card h2 i { font-size: 0.85rem; }

    .info-row {
        display: flex; flex-direction: column;
        margin-bottom: 1rem; padding-bottom: 1rem;
        border-bottom: 1px solid #f5f5f5;
    }
    .info-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .info-label {
        font-size: 0.72rem; font-weight: 600; letter-spacing: 1px;
        text-transform: uppercase; color: #aaa; margin-bottom: 0.2rem;
    }
    .info-value {
        font-size: 0.95rem; font-weight: 500; color: #222;
        display: flex; align-items: center; gap: 0.4rem;
    }
    .info-value i { color: #bbb; font-size: 0.9rem; }

    /* Lista mecánicos */
    .mechanics-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .mechanic-item {
        display: flex; align-items: center; justify-content: space-between;
        background: #f9f9f9; border-radius: 10px;
        padding: 0.65rem 0.9rem;
        border: 1px solid #f0f0f0;
        transition: background 0.2s;
    }
    .mechanic-item:hover { background: #f3f3f3; }
    .mechanic-name {
        font-size: 0.88rem; font-weight: 600; color: #222;
        display: flex; align-items: center; gap: 0.4rem;
    }
    .mechanic-name i { color: #bbb; }
    .mechanic-badge {
        font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
        background: rgba(192,57,43,0.1); color: #c0392b;
        border: 1px solid rgba(192,57,43,0.2);
        padding: 0.2rem 0.6rem; border-radius: 99px;
    }
    .no-mechanics {
        font-size: 0.85rem; color: #bbb; text-align: center;
        padding: 1.5rem 0; display: flex; flex-direction: column;
        align-items: center; gap: 0.4rem;
    }
    .no-mechanics i { font-size: 1.5rem; }

    /* ── ACCIONES ── */
    .actions-bar {
        display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem;
    }
    .btn-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #fff; border: 1.5px solid #e0e0e0; color: #555;
        font-size: 0.88rem; font-weight: 600; padding: 0.65rem 1.2rem;
        border-radius: 10px; text-decoration: none;
        transition: border-color 0.2s, color 0.2s, transform 0.15s;
    }
    .btn-back:hover { border-color: #999; color: #222; transform: translateY(-1px); }
    .btn-new-appt {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: linear-gradient(135deg, #c0392b, #96281b); color: #fff;
        font-size: 0.88rem; font-weight: 700; padding: 0.65rem 1.4rem;
        border-radius: 10px; text-decoration: none;
        box-shadow: 0 4px 16px rgba(192,57,43,0.3);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-new-appt:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,57,43,0.4); color: #fff; }

    @media (max-width: 640px) {
        .detail-grid { grid-template-columns: 1fr; }
        .detail-main { padding: 0 1rem; }
    }
</style>

<body class="ws-detail-page">

<!-- ── NAVBAR ── -->
<!-- Navbar compartido -->
<nav th:replace="~{fragments/navbar :: navbar('workshops')}"></nav>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Detalle del Taller</div>
        <h1 th:text="${workshop.name}">Nombre Taller</h1>
        <div class="hero-id">ID #<span th:text="${workshop.id}"></span> &nbsp;·&nbsp; NIF <span th:text="${workshop.nif}"></span></div>
    </div>
</div>

<!-- ── MAIN ── -->
<main class="detail-main">

    <div class="detail-grid">

        <!-- Datos generales -->
        <div class="detail-card">
            <h2><i class="bi bi-info-circle"></i> Datos Generales</h2>

            <div class="info-row">
                <span class="info-label">Ubicación</span>
                <span class="info-value">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${workshop.location} ?: 'No especificada'"></span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Horario</span>
                <span class="info-value">
                    <i class="bi bi-clock"></i>
                    <span th:text="${workshop.schedule} ?: 'No especificado'"></span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">NIF / CIF</span>
                <span class="info-value">
                    <i class="bi bi-building"></i>
                    <span th:text="${workshop.nif}"></span>
                </span>
            </div>
        </div>

        <!-- Mecánicos -->
        <div class="detail-card">
            <h2><i class="bi bi-person-gear"></i> Mecánicos en Plantilla</h2>

            <div class="mechanics-list" th:if="${!#lists.isEmpty(workshop.mechanics)}">
                <div class="mechanic-item" th:each="m : ${workshop.mechanics}">
                    <span class="mechanic-name">
                        <i class="bi bi-person"></i>
                        <span th:text="${m.name}"></span>
                    </span>
                    <span class="mechanic-badge" th:text="${m.specialty}"></span>
                </div>
            </div>

            <div class="no-mechanics" th:if="${#lists.isEmpty(workshop.mechanics)}">
                <i class="bi bi-person-x"></i>
                <span>Sin mecánicos asignados</span>
            </div>
        </div>

    </div>

    <!-- Acciones -->
    <div class="actions-bar">
        <a th:href="@{/workshops}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Volver a talleres
        </a>
        <a th:href="@{/appointments/new}" class="btn-new-appt" sec:authorize="isAuthenticated()">
            <i class="bi bi-calendar-plus"></i> Pedir cita aquí
        </a>
    </div>

</main>

<!-- ── FOOTER ── -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
