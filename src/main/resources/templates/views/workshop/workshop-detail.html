<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle Taller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="ws-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('workshops')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Detalle del Taller</div>
        <h1 th:text="${workshop.name}">Nombre Taller</h1>
        <div class="hero-id">ID #<span th:text="${workshop.id}"></span> &nbsp;·&nbsp; NIF <span th:text="${workshop.nif}"></span></div>
    </div>
</div>

<main class="detail-main">

    <div class="detail-grid-ws">

        <div class="detail-card-ws">
            <h2><i class="bi bi-info-circle"></i> Datos Generales</h2>

            <div class="info-row">
                <span class="info-label">Ubicación</span>
                <span class="info-value">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${workshop.location} ?: 'No especificada'"></span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Horario</span>
                <span class="info-value">
                    <i class="bi bi-clock"></i>
                    <span th:text="${workshop.schedule} ?: 'No especificado'"></span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">NIF / CIF</span>
                <span class="info-value">
                    <i class="bi bi-building"></i>
                    <span th:text="${workshop.nif}"></span>
                </span>
            </div>
        </div>

        <div class="detail-card-ws">
            <h2><i class="bi bi-person-gear"></i> Mecánicos en Plantilla</h2>

            <div class="mechanics-list" th:if="${!#lists.isEmpty(workshop.mechanics)}">
                <div class="mechanic-item" th:each="m : ${workshop.mechanics}">
                    <span class="mechanic-name">
                        <i class="bi bi-person"></i>
                        <span th:text="${m.name}"></span>
                    </span>
                    <span class="mechanic-badge" th:text="${m.specialty}"></span>
                </div>
            </div>

            <div class="no-mechanics" th:if="${#lists.isEmpty(workshop.mechanics)}">
                <i class="bi bi-person-x"></i>
                <span>Sin mecánicos asignados</span>
            </div>
        </div>

    </div>

    <div class="actions-bar">
        <a th:href="@{/workshops}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Volver a talleres
        </a>
        <a th:href="@{/workshops/edit/{id}(id=${workshop.id})}" class="btn-edit" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-pencil"></i> Editar Taller
        </a>
        <a th:href="@{/appointments/new}" class="btn-new-appt" sec:authorize="isAuthenticated()">
            <i class="bi bi-calendar-plus"></i> Pedir cita aquí
        </a>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
