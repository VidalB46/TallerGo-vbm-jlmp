<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Talleres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="workshops-page">

<nav th:replace="~{fragments/navbar :: navbar('workshops')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1.5rem;">
        <div class="page-hero-text">
            <div class="page-label">Directorio</div>
            <h1>Talleres</h1>
            <p>Encuentra el taller que más confianza te transmita.</p>
        </div>
        <a th:href="@{/workshops/new}" class="btn-new" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-lg"></i> Nuevo Taller
        </a>
    </div>
</div>

<main class="workshops-main">

    <div th:if="${successMessage}" class="alert-success-custom">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <div class="workshops-grid">
        <div th:each="w, stat : ${page.content}" class="ws-card"
             th:style="'animation-delay:' + ${stat.index * 80} + 'ms'">

            <div class="ws-card-img-placeholder">
                <i class="bi bi-tools"></i>
            </div>

            <div class="ws-card-body">
                <div class="ws-card-id"># <span th:text="${w.id}"></span></div>
                <div class="ws-card-name" th:text="${w.name}">Nombre Taller</div>
                <div class="ws-card-nif">
                    <i class="bi bi-building"></i>
                    <span th:text="${w.nif}">B12345678</span>
                </div>
                <div class="ws-card-location" th:if="${w.location}">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${w.location}">Ubicación</span>
                </div>

                <div class="ws-card-footer">
                    <a th:href="@{/workshops/detail(id=${w.id})}" class="btn-detail">
                        <i class="bi bi-eye"></i> Ver detalle
                    </a>

                    <form th:action="@{/workshops/delete/{id}(id=${w.id})}" method="post"
                          sec:authorize="hasRole('ADMIN')"
                          onsubmit="openDeleteModal(event, this)">
                        <button type="submit" class="btn-delete" title="Eliminar taller">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <nav class="pagination-bar" th:if="${page.totalPages > 1}">
        <a class="page-btn" th:classappend="${page.first} ? 'disabled'"
           th:href="@{/workshops(page=${page.number - 1})}">
            <i class="bi bi-chevron-left"></i>
        </a>
        <a class="page-btn" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
           th:classappend="${i == page.number} ? 'active'"
           th:href="@{/workshops(page=${i})}"
           th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${page.last} ? 'disabled'"
           th:href="@{/workshops(page=${page.number + 1})}">
            <i class="bi bi-chevron-right"></i>
        </a>
    </nav>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>
    const workshopImgs = [
        'https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600&q=80',
        'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80',
        'https://images.unsplash.com/photo-1625047509248-ec889cbff17f?w=600&q=80',
        'https://images.unsplash.com/photo-1609630875171-b1321377ee65?w=600&q=80',
        'https://images.unsplash.com/photo-1530046339160-ce3e530c7d2f?w=600&q=80',
        'https://images.unsplash.com/photo-1617469767987-a8ba26b4ee1c?w=600&q=80',
    ];
    document.querySelectorAll('.ws-card-img-placeholder').forEach((el, i) => {
        const img = document.createElement('img');
        img.src = workshopImgs[i % workshopImgs.length];
        img.alt = 'Taller';
        img.className = 'ws-card-img';
        el.replaceWith(img);
    });
</script>

<div id="customDeleteModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h3>¿Eliminar Taller?</h3>
        <p>Esta acción no se puede deshacer. Se eliminarán todos los mecánicos y servicios asociados.</p>
        <div class="modal-actions">
            <button type="button" class="btn-cancel-modal" onclick="closeDeleteModal()">Cancelar</button>
            <button type="button" class="btn-confirm-modal" id="confirmDeleteBtn">Sí, eliminar</button>
        </div>
    </div>
</div>

<style>
    .modal-overlay {
        display: none;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(4px);
        z-index: 9999;
        align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.2s ease;
    }
    .modal-overlay.active {
        display: flex; opacity: 1;
    }
    .modal-box {
        background: #fff; border-radius: 18px; padding: 2.5rem 2rem;
        max-width: 380px; width: 90%; text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        transform: translateY(20px); transition: transform 0.2s ease;
    }
    .modal-overlay.active .modal-box {
        transform: translateY(0);
    }
    .modal-icon i {
        font-size: 3.5rem; color: #c0392b;
    }
    .modal-box h3 {
        font-size: 1.3rem; font-weight: 800; color: #111; margin: 1rem 0 0.5rem; letter-spacing: -0.5px;
    }
    .modal-box p {
        font-size: 0.9rem; color: #666; margin-bottom: 2rem; line-height: 1.5;
    }
    .modal-actions {
        display: flex; gap: 0.8rem;
    }
    .modal-actions button {
        flex: 1; padding: 0.8rem 1rem; border-radius: 12px;
        font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none;
        transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-cancel-modal {
        background: #f4f4f6; color: #555; border: 1.5px solid #e0e0e0 !important;
    }
    .btn-cancel-modal:hover { background: #eaeaea; color: #111; }
    .btn-confirm-modal {
        background: linear-gradient(135deg, #c0392b, #96281b); color: #fff;
        box-shadow: 0 4px 12px rgba(192,57,43,0.3);
    }
    .btn-confirm-modal:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(192,57,43,0.45); }
</style>

<script>
    let formToDelete = null;

    function openDeleteModal(event, formElement) {
        event.preventDefault(); // Detiene el envío del formulario inmediatamente
        formToDelete = formElement; // Guarda la referencia del formulario concreto
        document.getElementById('customDeleteModal').classList.add('active'); // Muestra la ventana
    }

    function closeDeleteModal() {
        document.getElementById('customDeleteModal').classList.remove('active'); // Oculta la ventana
        formToDelete = null; // Limpia la variable
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
        if (formToDelete) {
            formToDelete.submit(); // Envía el formulario si se confirma la acción
        }
    });
</script>
</body>
</html>
