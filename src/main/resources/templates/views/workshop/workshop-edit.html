<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Editar Taller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="ws-form-page">

<nav th:replace="~{fragments/navbar :: navbar('workshops')}"></nav>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Administración</div>
        <h1>Editar Taller</h1>
        <p th:text="${workshop.name}">Nombre del taller</p>
    </div>
</div>

<!-- ── FORM ── -->
<main class="form-main">
    <div class="form-card">

        <div th:if="${errorMessage}" class="alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/workshops/update}" th:object="${workshop}" method="post">

            <!-- ID oculto obligatorio para el update -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-section-title">
                <i class="bi bi-building"></i> Información del Taller
            </div>

            <div class="field-group">
                <input type="text" th:field="*{nif}" id="nif" class="field-input"
                       placeholder=" " required />
                <label for="nif" class="field-label">NIF / CIF</label>
                <div th:if="${#fields.hasErrors('nif')}" class="field-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{nif}"></span>
                </div>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{name}" id="name" class="field-input"
                       placeholder=" " required />
                <label for="name" class="field-label">Nombre del Taller</label>
                <div th:if="${#fields.hasErrors('name')}" class="field-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{name}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <input type="text" th:field="*{phone}" id="phone" class="field-input" placeholder=" " />
                    <label for="phone" class="field-label">Teléfono</label>
                </div>
                <div class="field-group">
                    <input type="email" th:field="*{email}" id="email" class="field-input" placeholder=" " />
                    <label for="email" class="field-label">Email de contacto</label>
                </div>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{location}" id="location" class="field-input" placeholder=" " />
                <label for="location" class="field-label">Ubicación / Dirección</label>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{schedule}" id="schedule" class="field-input" placeholder=" " />
                <label for="schedule" class="field-label">Horario (ej: 09:00 - 18:00)</label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="bi bi-floppy2-fill"></i> Guardar Cambios
                </button>
                <a th:href="@{/workshops/detail(id=${workshop.id})}" class="btn-cancel">
                    <i class="bi bi-x-lg"></i> Cancelar
                </a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
