<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head ('Taller Go - Formulario Taller')}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">
        <h1 th:text="${workshop.nif == null} ? 'Nuevo Taller' : 'Editar Taller'">Formulario Taller</h1>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/workshops/insert}" th:object="${workshop}" method="post" class="mt-3">

            <div class="mb-3">
                <label for="nif" class="form-label">NIF / CIF</label>
                <input type="text" th:field="*{nif}" id="nif" class="form-control" placeholder="B12345678" required />
                <div th:if="${#fields.hasErrors('nif')}" class="text-danger" th:errors="*{nif}"></div>
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">Nombre del Taller</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Nombre comercial" required />
                <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Teléfono</label>
                    <input type="text" th:field="*{phone}" id="phone" class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email de contacto</label>
                    <input type="email" th:field="*{email}" id="email" class="form-control" />
                </div>
            </div>

            <div class="mb-3">
                <label for="location" class="form-label">Ubicación / Dirección</label>
                <input type="text" th:field="*{location}" id="location" class="form-control" />
            </div>

            <div class="mb-3">
                <label for="schedule" class="form-label">Horario</label>
                <input type="text" th:field="*{schedule}" id="schedule" class="form-control" placeholder="Ej: 09:00 - 18:00" />
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Guardar Taller</button>
                <a th:href="@{/workshops}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
