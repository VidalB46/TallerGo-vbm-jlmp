<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Nuevo Taller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.ws-form-page {
        display: block !important; height: auto !important;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #f4f4f6; color: #1a1a1a;
    }
    body.ws-form-page > nav,
    body.ws-form-page > div,
    body.ws-form-page > main,
    body.ws-form-page > footer { flex: unset !important; width: 100%; }

    @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.45); }
        50%       { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAVBAR ── */

    /* ── PAGE HERO ── */
    .page-hero {
        margin-top: 0;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        padding: calc(4rem + 64px) 2.5rem 2.5rem; position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: ''; position: absolute; top: -60px; right: -60px;
        width: 280px; height: 280px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero h1 { font-size: 1.9rem; font-weight: 800; color: #fff; }
    .page-hero p { color: rgba(255,255,255,0.4); font-size: 0.88rem; margin-top: 0.3rem; }

    /* ── FORM CARD ── */
    .form-main {
        max-width: 700px; margin: 2.5rem auto 4rem;
        padding: 0 2rem;
        animation: fadeUp 0.5s ease both;
    }
    .form-card {
        background: #fff; border-radius: 18px;
        border: 1.5px solid rgba(0,0,0,0.07);
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        padding: 2.2rem 2rem;
    }

    /* Floating label inputs */
    .field-group { position: relative; margin-bottom: 1.3rem; }
    .field-group .field-label {
        position: absolute; top: 50%; left: 0.9rem;
        transform: translateY(-50%);
        font-size: 0.88rem; font-weight: 500; color: #999;
        pointer-events: none; transition: all 0.2s ease;
        background: transparent; padding: 0 0.2rem;
    }
    .field-group .field-input {
        width: 100%; border: 1.5px solid #e8e8e8; border-radius: 10px;
        padding: 0.85rem 0.9rem 0.4rem; font-size: 0.95rem;
        font-family: inherit; background: #fafafa; color: #1a1a1a;
        outline: none; transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field-group .field-input:focus,
    .field-group .field-input:not(:placeholder-shown) { background: #fff; border-color: #c0392b; }
    .field-group .field-input:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
    .field-group .field-input:focus ~ .field-label,
    .field-group .field-input:not(:placeholder-shown) ~ .field-label {
        top: 0.55rem; font-size: 0.72rem; color: #c0392b; font-weight: 600;
    }
    .field-error {
        font-size: 0.78rem; color: #c0392b; margin-top: 0.3rem;
        display: flex; align-items: center; gap: 0.3rem;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .form-section-title {
        font-size: 0.72rem; font-weight: 700; letter-spacing: 2px;
        text-transform: uppercase; color: #c0392b;
        margin: 1.8rem 0 1rem; display: flex; align-items: center; gap: 0.4rem;
        padding-bottom: 0.5rem; border-bottom: 1px solid #f0f0f0;
    }

    /* Alerta error */
    .alert-error {
        background: rgba(192,57,43,0.07); border: 1px solid rgba(192,57,43,0.2);
        color: #a93226; border-radius: 10px; padding: 0.75rem 1rem;
        font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem;
        margin-bottom: 1.3rem;
    }

    /* Botones */
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.8rem; flex-wrap: wrap; }
    .btn-submit {
        display: inline-flex; align-items: center; gap: 0.5rem;
        background: linear-gradient(135deg, #c0392b, #96281b); color: #fff;
        font-weight: 700; font-size: 0.93rem; padding: 0.75rem 1.8rem;
        border-radius: 10px; border: none; cursor: pointer; font-family: inherit;
        box-shadow: 0 4px 16px rgba(192,57,43,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); }
    .btn-cancel {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #fff; border: 1.5px solid #e0e0e0; color: #666;
        font-size: 0.88rem; font-weight: 600; padding: 0.75rem 1.3rem;
        border-radius: 10px; text-decoration: none;
        transition: border-color 0.2s, color 0.2s;
    }
    .btn-cancel:hover { border-color: #999; color: #222; }

    @media (max-width: 640px) {
        .form-row { grid-template-columns: 1fr; }
        .form-main { padding: 0 1rem; }
    }
</style>
</head>

<body class="ws-form-page">

<!-- ── NAVBAR ── -->
<!-- Navbar compartido -->
<nav th:replace="~{fragments/navbar :: navbar('workshops')}"></nav>

<!-- ── PAGE HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Administración</div>
        <h1 th:text="${workshop.nif == null} ? 'Nuevo Taller' : 'Editar Taller'">Formulario Taller</h1>
        <p>Completa los datos del taller para registrarlo en el sistema.</p>
    </div>
</div>

<!-- ── FORM ── -->
<main class="form-main">
    <div class="form-card">

        <div th:if="${errorMessage}" class="alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/workshops/insert}" th:object="${workshop}" method="post">

            <div class="form-section-title">
                <i class="bi bi-building"></i> Información del Taller
            </div>

            <div class="field-group">
                <input type="text" th:field="*{nif}" id="nif" class="field-input"
                       placeholder=" " required />
                <label for="nif" class="field-label">NIF / CIF</label>
                <div th:if="${#fields.hasErrors('nif')}" class="field-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{nif}"></span>
                </div>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{name}" id="name" class="field-input"
                       placeholder=" " required />
                <label for="name" class="field-label">Nombre del Taller</label>
                <div th:if="${#fields.hasErrors('name')}" class="field-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{name}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <input type="text" th:field="*{phone}" id="phone" class="field-input" placeholder=" " />
                    <label for="phone" class="field-label">Teléfono</label>
                </div>
                <div class="field-group">
                    <input type="email" th:field="*{email}" id="email" class="field-input" placeholder=" " />
                    <label for="email" class="field-label">Email de contacto</label>
                </div>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{location}" id="location" class="field-input" placeholder=" " />
                <label for="location" class="field-label">Ubicación / Dirección</label>
            </div>

            <div class="field-group">
                <input type="text" th:field="*{schedule}" id="schedule" class="field-input" placeholder=" " />
                <label for="schedule" class="field-label">Horario (ej: 09:00 - 18:00)</label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="bi bi-floppy2-fill"></i> Guardar Taller
                </button>
                <a th:href="@{/workshops}" class="btn-cancel">
                    <i class="bi bi-x-lg"></i> Cancelar
                </a>
            </div>

        </form>
    </div>
</main>

<!-- ── FOOTER ── -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
