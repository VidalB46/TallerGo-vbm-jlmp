<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.repair-form.add})}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">
        <h1 th:text="#{msg.repair-form.add}">Iniciar Reparación</h1>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/repairs/new}" th:object="${repair}" method="post">
            <input type="hidden" th:field="*{appointmentId}" />
            <input type="hidden" th:field="*{vehicleId}" />

            <div class="mb-3">
                <label for="entryDate" class="form-label">Fecha de Entrada al Taller</label>
                <input type="date" th:field="*{entryDate}" id="entryDate" class="form-control" th:classappend="${#fields.hasErrors('entryDate')} ? 'is-invalid'" />
                <div class="invalid-feedback" th:if="${#fields.hasErrors('entryDate')}" th:errors="*{entryDate}"></div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notas iniciales del mecánico</label>
                <textarea th:field="*{notes}" id="notes" class="form-control" rows="4" placeholder="Ej: Vehículo ingresa con parachoques dañado..."></textarea>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Registrar Entrada</button>
                <a th:href="@{/appointments}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
