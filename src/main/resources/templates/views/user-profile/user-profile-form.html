<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Mi Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="profile-form-page">

<nav th:replace="~{fragments/navbar :: navbar('profile')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Cuenta</div>
        <h1>Mi Perfil</h1>
        <p>Actualiza tu información personal y foto de perfil.</p>
    </div>
</div>

<main class="form-main">
    <div class="form-card">
        <div class="form-card-header">
            <i class="bi bi-person-circle"></i>
            <h2>Datos personales</h2>
        </div>

        <form th:action="@{/profile/update}" th:object="${userProfileForm}"
              method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{userId}"/>

            <div class="form-card-body">

                <div class="alert-success" th:if="${successMessage}">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <div class="alert-error" th:if="${errorMessage}">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" th:field="*{email}" readonly/>
                </div>

                <div class="form-cols">
                    <div class="form-group">
                        <label for="firstName">Nombre</label>
                        <input type="text" id="firstName" class="form-control" th:field="*{firstName}" placeholder="Tu nombre"/>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Apellidos</label>
                        <input type="text" id="lastName" class="form-control" th:field="*{lastName}" placeholder="Tus apellidos"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Foto de perfil</label>
                    <div class="avatar-preview-wrap">
                        <img th:if="${userProfileForm.profileImage != null and !userProfileForm.profileImage.isEmpty()}"
                             th:src="${userProfileForm.profileImage}" class="avatar-preview" alt="Avatar"/>
                        <div class="avatar-placeholder" th:unless="${userProfileForm.profileImage != null and !userProfileForm.profileImage.isEmpty()}">
                            <i class="bi bi-person"></i>
                        </div>
                        <input type="file" name="profileImageFile" class="form-control" accept="image/*" style="flex:1;"/>
                    </div>
                    <div class="form-hint">Sube una imagen JPG/PNG (máx. 2 MB). Si no seleccionas, se conserva la actual.</div>
                </div>

                <div class="form-group">
                    <label for="bio">Biografía</label>
                    <textarea id="bio" class="form-control" th:field="*{bio}" placeholder="Cuéntanos algo sobre ti…"></textarea>
                </div>

            </div>

            <div class="form-card-footer">
                <button type="submit" class="btn-submit">
                    <i class="bi bi-check2-circle"></i> Guardar cambios
                </button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
