<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Taller Go - Mi Perfil')}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">
        <div class="text-center mb-4">
            <img th:src="${userProfileForm.profileImage} ?: @{/images/avatar.svg}"
                 class="rounded-circle border" style="width: 120px; height: 120px; object-fit: cover;">
            <h2 class="mt-2" th:text="#{msg.userProfile.title} ?: 'Mi Perfil'"></h2>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/profile/update}" th:object="${userProfileForm}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{userId}" />

            <div class="mb-3">
                <label class="form-label">Email (No editable)</label>
                <input type="text" th:field="*{email}" class="form-control" readonly>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{msg.userProfile.field.firstName} ?: 'Nombre'"></label>
                    <input type="text" th:field="*{firstName}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{msg.userProfile.field.lastName} ?: 'Apellidos'"></label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Cambiar Foto de Perfil</label>
                <input type="file" name="profileImageFile" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label class="form-label">Biografía</label>
                <textarea th:field="*{bio}" class="form-control" rows="3"></textarea>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                <a th:href="@{/}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
