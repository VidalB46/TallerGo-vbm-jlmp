<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{msg.appointment-detail.title})}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card" style="max-width: 800px;">
        <h1><span th:text="#{msg.appointment-detail.title}">Detalle Cita</span> #<span th:text="${appointment.id}"></span></h1>

        <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

        <div class="mt-4">
            <h5 th:text="#{msg.appointment-detail.section.data}">Datos de la Cita</h5>
            <dl class="row">
                <dt class="col-sm-3" th:text="#{msg.appointment-detail.field.status}">Estado</dt>
                <dd class="col-sm-9">
                    <span class="badge px-3 py-2 text-white"
                          th:classappend="${#strings.toString(appointment.status) == 'SOLICITADO' ? 'bg-warning text-dark' :
                                        (#strings.toString(appointment.status) == 'CONFIRMADO' ? 'bg-success' :
                                        (#strings.toString(appointment.status) == 'CANCELADO' or #strings.toString(appointment.status) == 'RECHAZADA' ? 'bg-danger' :
                                        (#strings.toString(appointment.status) == 'EN_TALLER' ? 'bg-secondary' :
                                        (#strings.toString(appointment.status) == 'EN_REPARACION' ? 'bg-info text-dark' :
                                        (#strings.toString(appointment.status) == 'LISTO_RECOGIDA' ? 'bg-success' : 'bg-dark')))))}"
                          th:text="${appointment.status.displayName}">
                    </span>
                </dd>

                <dt class="col-sm-3" th:text="#{msg.appointment-detail.field.startDate}">Fecha</dt>
                <dd class="col-sm-9" th:text="${#temporals.format(appointment.startDate, 'dd/MM/yyyy HH:mm')}"></dd>

                <dt class="col-sm-3" th:text="#{msg.appointment-detail.field.user}">Usuario</dt>
                <dd class="col-sm-9" th:text="${appointment.userEmail}"></dd>
            </dl>
        </div>

        <div class="mt-4">
            <h5 th:text="#{msg.appointment-detail.section.notes}">Motivo / Notas</h5>
            <div class="alert alert-secondary">
                <p class="mb-0" th:text="${appointment.notes != null and !#strings.isEmpty(appointment.notes) ? appointment.notes : 'Sin notas adicionales.'}"></p>
            </div>
        </div>

        <hr class="mt-5 mb-4">

        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/appointments}" class="btn btn-outline-secondary">Volver al listado</a>

            <div class="d-flex gap-2">

                <form sec:authorize="hasRole('CLIENT')"
                      th:if="${#strings.toString(appointment.status) == 'SOLICITADO' or #strings.toString(appointment.status) == 'CONFIRMADO'}"
                      th:action="@{/appointments/{id}/cancel(id=${appointment.id})}" method="post"
                      onsubmit="return confirm('¿Estás seguro de que deseas cancelar esta cita?');">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-x-circle"></i> Cancelar Cita
                    </button>
                </form>

                <a sec:authorize="hasRole('CLIENT')"
                   th:if="${#strings.toString(appointment.status) == 'EN_TALLER' or #strings.toString(appointment.status) == 'EN_REPARACION' or #strings.toString(appointment.status) == 'LISTO_RECOGIDA' or #strings.toString(appointment.status) == 'RECOGIDO'}"
                   th:href="@{/budgets/repair/{id}(id=${appointment.repairId})}"
                   class="btn btn-info text-white">
                    <i class="bi bi-receipt"></i> Ver Presupuesto
                </a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:if="${appointment.repairId != null}"
                   th:href="@{/repairs/{id}(id=${appointment.repairId})}"
                   class="btn btn-secondary text-white">
                    <i class="bi bi-gear"></i> Gestión de Reparación
                </a>

                <form sec:authorize="hasRole('ADMIN')"
                      th:if="${#strings.toString(appointment.status) == 'SOLICITADO'}"
                      th:action="@{/appointments/{id}/confirm(id=${appointment.id})}" method="post">
                    <button type="submit" class="btn btn-success">Confirmar Cita</button>
                </form>

                <form sec:authorize="hasRole('ADMIN')"
                      th:if="${#strings.toString(appointment.status) == 'SOLICITADO'}"
                      th:action="@{/appointments/{id}/cancel(id=${appointment.id})}" method="post">
                    <button type="submit" class="btn btn-danger">Rechazar Cita</button>
                </form>

                <a sec:authorize="hasRole('ADMIN')"
                   th:if="${#strings.toString(appointment.status) == 'CONFIRMADO'}"
                   th:href="@{/repairs/new(appointmentId=${appointment.id}, vehicleId=${appointment.vehicle.id})}"
                   class="btn btn-primary">Recepcionar Vehículo</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
