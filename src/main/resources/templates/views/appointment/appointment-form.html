<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Nueva Cita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.appt-form-page {
        font-family: 'Inter', sans-serif;
        background: #f4f4f6;
        color: #1a1a1a;
        display: block !important;
        height: auto !important;
        min-height: 100vh;
    }
    body.appt-form-page > nav,
    body.appt-form-page > div,
    body.appt-form-page > main,
    body.appt-form-page > footer { flex: unset !important; width: 100%; }

    .tgo-nav {
        background: rgba(10,10,10,0.93) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ── */
    .page-hero {
        margin-top: 0;
        padding: calc(4rem + 64px) 2.5rem 5rem;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        position: relative; overflow: hidden;
    }
    .page-hero::before {
        content: '';
        position: absolute; top: -60px; right: -60px;
        width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
        pointer-events: none;
    }
    .page-hero-inner {
        max-width: 760px; margin: 0 auto;
        position: relative; z-index: 1;
    }
    .page-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px;
        text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem;
    }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p  { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }

    /* ── FORM CARD ── */
    .form-main {
        max-width: 760px; margin: 2.5rem auto;
        padding: 0 2rem 5rem;
        animation: fadeUp 0.5s ease both;
    }
    .form-card {
        background: #fff;
        border: 1.5px solid rgba(0,0,0,0.07);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        overflow: hidden;
    }
    .form-card-body { padding: 2rem 2.5rem; }

    /* Alerta de error */
    .alert-error-custom {
        background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.25);
        color: #c0392b; border-radius: 10px; padding: 0.8rem 1rem;
        font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    /* Campos del formulario */
    .field-group { margin-bottom: 1.4rem; }
    .field-group label {
        display: block; font-size: 0.78rem; font-weight: 700;
        color: #555; text-transform: uppercase; letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }
    .field-group select,
    .field-group input,
    .field-group textarea {
        width: 100%; font-family: 'Inter', sans-serif;
        font-size: 0.92rem; font-weight: 500; color: #111;
        background: #fafafa; border: 1.5px solid #e5e5e5;
        border-radius: 10px; padding: 0.7rem 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none; appearance: none;
    }
    .field-group select:focus,
    .field-group input:focus,
    .field-group textarea:focus {
        border-color: #c0392b;
        box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
        background: #fff;
    }
    .field-group select.is-invalid,
    .field-group input.is-invalid,
    .field-group textarea.is-invalid {
        border-color: #c0392b;
    }
    .field-error {
        font-size: 0.78rem; color: #c0392b; margin-top: 0.35rem;
        display: flex; align-items: center; gap: 0.3rem;
    }
    .field-group textarea { resize: vertical; min-height: 100px; }

    /* Footer del form */
    .form-card-footer {
        padding: 1.2rem 2.5rem;
        border-top: 1.5px solid #f0f0f0;
        display: flex; gap: 0.75rem; align-items: center;
    }
    .btn-submit {
        display: inline-flex; align-items: center; gap: 0.5rem;
        background: linear-gradient(135deg, #c0392b, #96281b);
        color: #fff; font-weight: 700; font-size: 0.88rem;
        padding: 0.7rem 1.6rem; border-radius: 10px;
        border: none; cursor: pointer; font-family: inherit;
        box-shadow: 0 4px 16px rgba(192,57,43,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); }
    .btn-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600;
        padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none;
        border: 1.5px solid #e0e0e0;
        transition: background 0.2s, color 0.2s;
    }
    .btn-back:hover { background: #eaeaea; color: #111; }

    @media (max-width: 640px) {
        .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; }
        .form-main { padding: 0 1rem 3rem; }
        .form-card-body { padding: 1.5rem; }
        .form-card-footer { padding: 1rem 1.5rem; flex-wrap: wrap; }
    }
</style>
</head>

<body class="appt-form-page">

<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<!-- ── HERO ── -->
<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Agenda</div>
        <h1>Solicitar Cita</h1>
        <p>Elige el taller, el vehículo y la fecha que mejor te venga.</p>
    </div>
</div>

<!-- ── FORM ── -->
<main class="form-main">
    <div class="form-card">
        <div class="form-card-body">

            <div th:if="${error}" class="alert-error-custom">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/appointments/new}" th:object="${appointment}" method="post">

                <div class="field-group">
                    <label for="workshopId"><i class="bi bi-building"></i> Taller</label>
                    <select id="workshopId" th:field="*{workshopId}"
                            th:classappend="${#fields.hasErrors('workshopId')} ? 'is-invalid'">
                        <option value="" disabled selected>Selecciona un taller...</option>
                        <option th:each="w : ${workshops}"
                                th:value="${w.id}"
                                th:text="${w.name + ' — ' + w.location}"></option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('workshopId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{workshopId}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="vehicleId"><i class="bi bi-car-front-fill"></i> Vehículo</label>
                    <select id="vehicleId" th:field="*{vehicleId}"
                            th:classappend="${#fields.hasErrors('vehicleId')} ? 'is-invalid'">
                        <option value="" disabled selected>Selecciona un vehículo...</option>
                        <option th:each="v : ${vehicles}"
                                th:value="${v.id}"
                                th:text="${v.matricula + ' — ' + v.brandName + ' ' + v.model}"></option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('vehicleId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{vehicleId}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="startDate"><i class="bi bi-calendar-event"></i> Fecha y hora</label>
                    <input type="datetime-local" th:field="*{startDate}" id="startDate"
                           th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'" />
                    <div class="field-error" th:if="${#fields.hasErrors('startDate')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{startDate}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="notes"><i class="bi bi-chat-left-text"></i> Notas (opcional)</label>
                    <textarea th:field="*{notes}" id="notes"
                              placeholder="Describe el problema o cualquier información útil para el taller..."></textarea>
                    <div class="field-error" th:if="${#fields.hasErrors('notes')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{notes}"></span>
                    </div>
                </div>

                <div class="form-card-footer" style="padding: 1.2rem 0 0; border-top: 1.5px solid #f0f0f0; margin-top: 0.5rem;">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-calendar-check"></i> Solicitar cita
                    </button>
                    <a th:href="@{/appointments}" class="btn-back">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>

            </form>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
