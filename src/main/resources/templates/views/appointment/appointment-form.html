<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Nueva Cita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="appt-form-page">

<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Agenda</div>
        <h1>Solicitar Cita</h1>
        <p>Elige el taller, el vehículo y la fecha que mejor te venga.</p>
    </div>
</div>

<main class="form-main">
    <div class="form-card">
        <div class="form-card-body">

            <div th:if="${error}" class="alert-error-custom">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/appointments/new}" th:object="${appointment}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>

                <div class="field-group">
                    <label for="workshopId"><i class="bi bi-building"></i> Taller</label>
                    <select id="workshopId" th:field="*{workshopId}" required
                            th:classappend="${#fields.hasErrors('workshopId')} ? 'is-invalid'">
                        <option value="" disabled selected>Selecciona un taller...</option>
                        <option th:each="w : ${workshops}"
                                th:value="${w.id}"
                                th:text="${w.name + ' — ' + w.location}"></option>
                    </select>
                    <div class="invalid-feedback-custom">
                        <i class="bi bi-exclamation-circle"></i> Por favor, selecciona un taller.
                    </div>
                    <div class="field-error" th:if="${#fields.hasErrors('workshopId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{workshopId}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="vehicleId"><i class="bi bi-car-front-fill"></i> Vehículo</label>
                    <select id="vehicleId" th:field="*{vehicleId}" required
                            th:classappend="${#fields.hasErrors('vehicleId')} ? 'is-invalid'">
                        <option value="" disabled selected>Selecciona un vehículo...</option>
                        <option th:each="v : ${vehicles}"
                                th:value="${v.id}"
                                th:text="${v.matricula + ' — ' + v.brandName + ' ' + v.model}"></option>
                    </select>
                    <div class="invalid-feedback-custom">
                        <i class="bi bi-exclamation-circle"></i> Por favor, selecciona tu vehículo.
                    </div>
                    <div class="field-error" th:if="${#fields.hasErrors('vehicleId')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{vehicleId}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="startDate"><i class="bi bi-calendar-event"></i> Fecha y hora</label>
                    <input type="datetime-local" th:field="*{startDate}" id="startDate" required
                           th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'" />
                    <div class="invalid-feedback-custom">
                        <i class="bi bi-exclamation-circle"></i> Por favor, indica una fecha válida.
                    </div>
                    <div class="field-error" th:if="${#fields.hasErrors('startDate')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{startDate}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="notes"><i class="bi bi-chat-left-text"></i> Notas (opcional)</label>
                    <textarea th:field="*{notes}" id="notes"
                              placeholder="Describe el problema o cualquier información útil para el taller..."></textarea>
                    <div class="field-error" th:if="${#fields.hasErrors('notes')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{notes}"></span>
                    </div>
                </div>

                <div class="field-group">
                    <label for="mediaFile"><i class="bi bi-camera-video"></i> Foto o Vídeo de la avería (Opcional)</label>
                    <input type="file" id="mediaFile" th:field="*{mediaFile}" accept="image/*, video/*"
                           th:classappend="${#fields.hasErrors('mediaFile')} ? 'is-invalid'"
                           style="padding: 0.5rem 1rem; background: #fff; cursor: pointer;" />
                    <small style="font-size: 0.78rem; color: #888; margin-top: 0.4rem; display: block;">
                        Sube una foto clara del daño o un vídeo corto si hace un ruido extraño (Máx. 50MB).
                    </small>
                    <div class="field-error" th:if="${#fields.hasErrors('mediaFile')}">
                        <i class="bi bi-exclamation-circle"></i>
                        <span th:errors="*{mediaFile}"></span>
                    </div>
                </div>

                <div class="form-card-footer" style="padding: 1.2rem 0 0; border-top: 1.5px solid #f0f0f0; margin-top: 0.5rem;">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-calendar-check"></i> Solicitar cita
                    </button>
                    <a th:href="@{/appointments}" class="btn-back">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>

            </form>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.getElementById('startDate');
        if(dateInput) {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1); // Sumamos un día (mañana)
            // Ajustamos a la zona horaria local
            tomorrow.setMinutes(tomorrow.getMinutes() - tomorrow.getTimezoneOffset());
            // Formateamos a YYYY-MM-DDThh:mm
            dateInput.min = tomorrow.toISOString().slice(0, 16);
        }
    });
</script>

</body>
</html>
