<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${brand.id != null} ? 'TallerGO — Editar Marca' : 'TallerGO — Nueva Marca'">TallerGO — Marca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.brand-form-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    body.brand-form-page > nav, body.brand-form-page > div, body.brand-form-page > main, body.brand-form-page > footer { flex: unset !important; width: 100%; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .form-main { max-width: 680px; margin: 2.5rem auto; padding: 0 2rem 5rem; animation: fadeUp 0.5s ease both; }
    .form-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .form-card-header { padding: 1.5rem 2.2rem; border-bottom: 1.5px solid #f0f0f0; display: flex; align-items: center; gap: 0.7rem; }
    .form-card-header i { font-size: 1.3rem; color: #c0392b; }
    .form-card-header h2 { font-size: 1rem; font-weight: 700; color: #111; }
    .form-card-body { padding: 2rem 2.2rem; }
    .form-group { margin-bottom: 1.4rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 0.5rem; }
    .form-control { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e0e0e0; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.92rem; color: #111; background: #f9f9fb; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .form-control:focus { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.1); background: #fff; }
    .alert-error { background: rgba(192,57,43,0.07); border: 1.5px solid rgba(192,57,43,0.2); border-radius: 12px; padding: 0.9rem 1.2rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: #c0392b; display: flex; align-items: center; gap: 0.5rem; }
    .form-card-footer { padding: 1.2rem 2.2rem; border-top: 1.5px solid #f0f0f0; display: flex; gap: 0.75rem; }
    .btn-cancel { display: inline-flex; align-items: center; gap: 0.4rem; background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600; padding: 0.65rem 1.3rem; border-radius: 10px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
    .btn-cancel:hover { background: #eaeaea; color: #111; }
    .btn-submit { display: inline-flex; align-items: center; gap: 0.4rem; background: #c0392b; color: #fff; font-size: 0.85rem; font-weight: 700; padding: 0.65rem 1.5rem; border-radius: 10px; border: none; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #a93226; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .form-main { padding: 0 1rem 3rem; } .form-card-body { padding: 1.5rem; } .form-card-footer { padding: 1rem 1.5rem; } }
</style>
</head>
<body class="brand-form-page">

<nav th:replace="~{fragments/navbar :: navbar('brands')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Marcas</div>
        <h1 th:text="${brand.id != null} ? 'Editar Marca' : 'Nueva Marca'">Marca</h1>
        <p th:text="${brand.id != null} ? 'Modifica los datos de la marca.' : 'Registra una nueva marca de vehículo.'"></p>
    </div>
</div>

<main class="form-main">
    <div class="form-card">
        <div class="form-card-header">
            <i class="bi bi-shield-plus"></i>
            <h2 th:text="${brand.id != null} ? 'Editar marca' : 'Nueva marca'">Marca</h2>
        </div>

        <form th:action="${brand.id != null} ? @{/brands/update} : @{/brands/insert}"
              th:object="${brand}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-card-body">

                <div class="alert-error" th:if="${errorMessage}">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <div class="form-group">
                    <label for="name">Nombre <span style="color:#c0392b">*</span></label>
                    <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="Ej: Toyota, BMW, Ford…" required/>
                </div>

                <div class="form-group">
                    <label for="country">País de origen</label>
                    <input type="text" id="country" class="form-control" th:field="*{country}" placeholder="Ej: Japón, Alemania, EE.UU.…"/>
                </div>

            </div>

            <div class="form-card-footer">
                <a th:href="@{/brands}" class="btn-cancel"><i class="bi bi-x"></i> Cancelar</a>
                <button type="submit" class="btn-submit">
                    <i class="bi bi-check2"></i>
                    <span th:text="${brand.id != null} ? 'Guardar cambios' : 'Crear marca'">Guardar</span>
                </button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
