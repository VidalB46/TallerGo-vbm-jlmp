<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle de Marca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="brand-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('brands')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Marcas</div>
        <h1 th:text="${brand.name}">Marca</h1>
        <p>Información detallada y vehículos asociados.</p>
    </div>
</div>

<main class="detail-main">

    <div class="detail-card">
        <div class="detail-card-visual">
            <i class="bi bi-shield-fill"></i>
        </div>
        <div class="detail-card-body">
            <div class="brand-header">
                <div class="brand-name">
                    <i class="bi bi-shield-check"></i>
                    <span th:text="${brand.name}"></span>
                </div>
                <span class="badge-country" th:if="${brand.country}">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${brand.country}"></span>
                </span>
            </div>
            <div class="detail-meta">
                <div class="meta-item">
                    <label>ID</label>
                    <span th:text="${brand.id}"></span>
                </div>
                <div class="meta-item">
                    <label>País de origen</label>
                    <span th:text="${brand.country} ?: 'N/A'"></span>
                </div>
                <div class="meta-item">
                    <label>Vehículos registrados</label>
                    <span th:text="${brand.vehicles != null} ? ${#lists.size(brand.vehicles)} : '0'"></span>
                </div>
            </div>
        </div>
        <div class="detail-card-footer">
            <a th:href="@{/brands}" class="btn-back"><i class="bi bi-arrow-left"></i> Volver</a>
            <a th:href="@{/brands/edit(id=${brand.id})}" class="btn-edit" sec:authorize="hasRole('ADMIN')"><i class="bi bi-pencil"></i> Editar</a>
        </div>
    </div>

    <div class="vehicles-card">
        <div class="vehicles-card-header">
            <i class="bi bi-car-front"></i>
            <span>Vehículos de esta marca</span>
        </div>

        <div class="empty-vehicles" th:if="${brand.vehicles == null or brand.vehicles.isEmpty()}">
            <i class="bi bi-car-front" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
            No hay vehículos registrados para esta marca.
        </div>

        <div class="table-scroll">
            <table class="vehicles-table" th:if="${brand.vehicles != null and !brand.vehicles.isEmpty()}">
                <thead>
                <tr>
                    <th>Modelo</th>
                    <th>Matrícula</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${brand.vehicles}">
                    <td class="td-model" th:text="${v.model}"></td>
                    <td><span class="td-matricula" th:text="${v.matricula}"></span></td>
                    <td>
                        <a th:href="@{/vehicles/detail(id=${v.id})}" class="btn-vehicle-link">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div></div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
