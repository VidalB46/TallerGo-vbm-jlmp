<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.brand-detail.title})}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card" style="max-width: 800px;">
        <h1><span th:text="#{msg.brand-detail.title}">Detalle</span>: <span th:text="${brand.name}"></span></h1>

        <div class="mt-4">
            <h5 th:text="#{msg.brand-detail.section.brandData}">Datos</h5>
            <dl class="row">
                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.id}">ID</dt>
                <dd class="col-sm-9" th:text="${brand.id}"></dd>
                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.name}">Nombre</dt>
                <dd class="col-sm-9" th:text="${brand.name}"></dd>
                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.country}">País</dt>
                <dd class="col-sm-9" th:text="${brand.country}"></dd>
            </dl>
        </div>

        <div class="mt-4">
            <h5 th:text="#{msg.brand-detail.section.vehicles}">Vehículos</h5>
            <div th:if="${#lists.isEmpty(brand.vehicles)}" class="alert alert-info" th:text="#{msg.brand-detail.vehicles.empty}"></div>

            <table th:if="${!#lists.isEmpty(brand.vehicles)}" class="table table-striped">
                <thead>
                <tr>
                    <th th:text="#{msg.brand-detail.vehicles.col.model}">Modelo</th>
                    <th th:text="#{msg.brand-detail.vehicles.col.matricula}">Matrícula</th>
                    <th class="text-end" th:text="#{msg.brand-detail.vehicles.col.actions}">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${brand.vehicles}">
                    <td th:text="${v.model}"></td>
                    <td th:text="${v.matricula}"></td>
                    <td class="text-end">
                        <a th:href="@{/vehicles/detail(id=${v.id})}" class="btn btn-sm btn-outline-primary" th:text="#{msg.brand-detail.viewDetail}">Ver</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/brands}" class="btn btn-secondary" th:text="#{msg.brand-detail.action.back}">Volver</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
