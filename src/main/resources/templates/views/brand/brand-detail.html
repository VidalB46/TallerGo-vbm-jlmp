<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle de Marca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.brand-detail-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    body.brand-detail-page > nav, body.brand-detail-page > div, body.brand-detail-page > main, body.brand-detail-page > footer { flex: unset !important; width: 100%; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .detail-main { max-width: 900px; margin: 2.5rem auto; padding: 0 2rem 5rem; animation: fadeUp 0.5s ease both; display: flex; flex-direction: column; gap: 1.5rem; }
    .detail-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .detail-card-visual { height: 100px; background: linear-gradient(135deg, #1a1a1a 0%, #111 100%); display: flex; align-items: center; justify-content: center; }
    .detail-card-visual i { font-size: 3rem; color: rgba(255,255,255,0.08); }
    .detail-card-body { padding: 2rem 2.5rem; }
    .brand-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem; padding-bottom: 1.5rem; border-bottom: 1.5px solid #f0f0f0; }
    .brand-name { font-size: 1.4rem; font-weight: 900; color: #111; display: flex; align-items: center; gap: 0.5rem; }
    .brand-name i { color: #c0392b; }
    .badge-country { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(192,57,43,0.07); border: 1.5px solid rgba(192,57,43,0.15); border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 700; color: #c0392b; }
    .detail-meta { display: flex; gap: 2rem; flex-wrap: wrap; }
    .meta-item label { display: block; font-size: 0.68rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.2rem; }
    .meta-item span { font-size: 0.9rem; font-weight: 700; color: #111; }
    .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c0392b; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
    .vehicles-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .vehicles-card-header { padding: 1.2rem 1.8rem; border-bottom: 1.5px solid #f0f0f0; display: flex; align-items: center; gap: 0.5rem; }
    .vehicles-card-header i { color: #c0392b; }
    .vehicles-card-header span { font-size: 0.9rem; font-weight: 700; color: #111; }
    .vehicles-table { width: 100%; border-collapse: collapse; }
    .vehicles-table thead tr { background: #111; }
    .vehicles-table thead th { padding: 0.75rem 1.2rem; text-align: left; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.6); }
    .vehicles-table tbody tr { border-bottom: 1px solid #f4f4f6; transition: background 0.15s; }
    .vehicles-table tbody tr:last-child { border-bottom: none; }
    .vehicles-table tbody tr:hover { background: #fafafa; }
    .vehicles-table td { padding: 0.9rem 1.2rem; font-size: 0.87rem; color: #333; vertical-align: middle; }
    .td-model { font-weight: 700; color: #111; }
    .td-matricula { font-family: monospace; font-size: 0.8rem; background: #f0f0f2; border-radius: 6px; padding: 0.2rem 0.6rem; color: #555; font-weight: 700; }
    .btn-vehicle-link { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(52,152,219,0.08); color: #2980b9; border: 1.5px solid rgba(52,152,219,0.2); font-size: 0.73rem; font-weight: 600; padding: 0.3rem 0.75rem; border-radius: 8px; text-decoration: none; transition: all 0.2s; }
    .btn-vehicle-link:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    .empty-vehicles { padding: 2.5rem; text-align: center; color: #ccc; font-size: 0.88rem; }
    .detail-card-footer { padding: 1.2rem 2.5rem; border-top: 1.5px solid #f0f0f0; display: flex; gap: 0.75rem; }
    .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
    .btn-back:hover { background: #eaeaea; color: #111; }
    .btn-edit { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(52,152,219,0.09); color: #2980b9; border: 1.5px solid rgba(52,152,219,0.2); font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; transition: all 0.2s; }
    .btn-edit:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .detail-main { padding: 0 1rem 3rem; } .detail-card-body { padding: 1.5rem; } .detail-card-footer { padding: 1rem 1.5rem; } }
</style>
</head>
<body class="brand-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('brands')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Marcas</div>
        <h1 th:text="${brand.name}">Marca</h1>
        <p>Información detallada y vehículos asociados.</p>
    </div>
</div>

<main class="detail-main">

    <!-- Info card -->
    <div class="detail-card">
        <div class="detail-card-visual">
            <i class="bi bi-shield-fill"></i>
        </div>
        <div class="detail-card-body">
            <div class="brand-header">
                <div class="brand-name">
                    <i class="bi bi-shield-check"></i>
                    <span th:text="${brand.name}"></span>
                </div>
                <span class="badge-country" th:if="${brand.country}">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${brand.country}"></span>
                </span>
            </div>
            <div class="detail-meta">
                <div class="meta-item">
                    <label>ID</label>
                    <span th:text="${brand.id}"></span>
                </div>
                <div class="meta-item">
                    <label>País de origen</label>
                    <span th:text="${brand.country} ?: 'N/A'"></span>
                </div>
                <div class="meta-item">
                    <label>Vehículos registrados</label>
                    <span th:text="${brand.vehicles != null} ? ${#lists.size(brand.vehicles)} : '0'"></span>
                </div>
            </div>
        </div>
        <div class="detail-card-footer">
            <a th:href="@{/brands}" class="btn-back"><i class="bi bi-arrow-left"></i> Volver</a>
            <a th:href="@{/brands/edit(id=${brand.id})}" class="btn-edit" sec:authorize="hasRole('ADMIN')"><i class="bi bi-pencil"></i> Editar</a>
        </div>
    </div>

    <!-- Vehicles card -->
    <div class="vehicles-card">
        <div class="vehicles-card-header">
            <i class="bi bi-car-front"></i>
            <span>Vehículos de esta marca</span>
        </div>

        <div class="empty-vehicles" th:if="${brand.vehicles == null or brand.vehicles.isEmpty()}">
            <i class="bi bi-car-front" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
            No hay vehículos registrados para esta marca.
        </div>

        <table class="vehicles-table" th:if="${brand.vehicles != null and !brand.vehicles.isEmpty()}">
            <thead>
                <tr>
                    <th>Modelo</th>
                    <th>Matrícula</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="v : ${brand.vehicles}">
                    <td class="td-model" th:text="${v.model}"></td>
                    <td><span class="td-matricula" th:text="${v.matricula}"></span></td>
                    <td>
                        <a th:href="@{/vehicles/detail(id=${v.id})}" class="btn-vehicle-link">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
