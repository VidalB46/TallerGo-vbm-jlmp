<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Taller Go - Detalle Marca')"></head>

<body class="d-flex flex-column h-100">

<header th:replace="fragments/header :: header"></header>

<main class="form-page">
    <div class="form-card" style="max-width: 800px;"> <h1>
        <span th:text="#{msg.brand-detail.title}">Detalle Marca</span>:
        <span th:text="${brand.name}"></span>
    </h1>

        <div class="mt-3">
            <h2 class="h5" th:text="#{msg.brand-detail.section.brandData}">Datos de la Marca</h2>

            <dl class="row">
                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.id}">ID</dt>
                <dd class="col-sm-9" th:text="${brand.id}"></dd>

                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.name}">Nombre</dt>
                <dd class="col-sm-9" th:text="${brand.name}"></dd>

                <dt class="col-sm-3" th:text="#{msg.brand-detail.field.country}">País</dt>
                <dd class="col-sm-9" th:text="${brand.country}"></dd>
            </dl>
        </div>

        <div class="mt-4">
            <h2 class="h5" th:text="#{msg.brand-detail.section.vehicles}">Vehículos Asociados</h2>

            <div class="alert alert-info" th:if="${#lists.isEmpty(brand.vehicles)}"
                 th:text="#{msg.brand-detail.vehicles.empty}">
                No hay vehículos registrados para esta marca.
            </div>

            <div th:if="${!#lists.isEmpty(brand.vehicles)}" class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead>
                    <tr>
                        <th scope="col" th:text="#{msg.brand-detail.vehicles.col.id}">ID</th>
                        <th scope="col" th:text="#{msg.brand-detail.vehicles.col.model}">Modelo</th>
                        <th scope="col" th:text="#{msg.brand-detail.vehicles.col.matricula}">Matrícula</th>
                        <th scope="col" class="text-end" th:text="#{msg.brand-detail.vehicles.col.actions}">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="vehicle : ${brand.vehicles}">
                        <td th:text="${vehicle.id}"></td>
                        <td th:text="${vehicle.model}"></td>
                        <td th:text="${vehicle.matricula}"></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/vehicles/detail(id=${vehicle.id})}"
                               th:text="#{msg.brand-detail.viewDetail}">
                                Ver
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/brands}" class="btn btn-secondary" th:text="#{msg.brand-list.returnback}">Volver</a>
        </div>

    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
