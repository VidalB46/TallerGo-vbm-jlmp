<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.header.brands} + ' - ' + #{password.reset.forgot.title})}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="fragments/header :: header"></header>

<main class="form-page">
    <div class="form-card">

        <h1 th:text="#{password.reset.forgot.title} ?: 'Recuperar Contraseña'"></h1>

        <p class="text-muted" th:text="#{password.reset.forgot.info} ?: 'Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.'"></p>

        <div th:if="${successMessage}" class="alert alert-success">
            <p th:text="${successMessage}"></p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>

        <form th:action="@{/auth/forgot}" th:object="${dto}" method="post" class="mt-3">

            <div class="mb-3">
                <label for="email" class="form-label" th:text="#{password.reset.email.label} ?: 'Email'"></label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-control"
                       th:placeholder="#{password.reset.email.placeholder} ?: 'ejemplo@correo.com'"
                       required
                       autofocus>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100"
                    th:text="#{password.reset.forgot.submit} ?: 'Enviar enlace'">
            </button>

            <div class="d-flex justify-content-center mt-3">
                <a th:href="@{/login}" class="btn btn-link btn-sm p-0"
                   th:text="#{password.reset.back.login} ?: 'Volver al inicio de sesión'"></a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
