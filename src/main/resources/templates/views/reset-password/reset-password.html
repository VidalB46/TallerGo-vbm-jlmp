<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.header.brands} + ' - ' + #{password.reset.title})}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="fragments/header :: header"></header>

<main class="form-page">
    <div class="form-card">

        <h1 th:text="#{password.reset.title} ?: 'Nueva Contraseña'"></h1>

        <p class="text-muted" th:text="#{password.reset.info} ?: 'Elige una contraseña segura que no hayas usado antes.'"></p>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>

        <form th:action="@{/auth/reset-password}" th:object="${dto}" method="post" class="mt-3">

            <input type="hidden" th:field="*{token}"/>

            <div class="mb-3">
                <label for="newPassword" class="form-label" th:text="#{password.reset.newPassword.label} ?: 'Nueva Contraseña'"></label>
                <input type="password"
                       id="newPassword"
                       th:field="*{newPassword}"
                       class="form-control"
                       required
                       autofocus>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('newPassword')}"
                     th:errors="*{newPassword}">
                </div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label" th:text="#{password.reset.confirmPassword.label} ?: 'Confirmar Contraseña'"></label>
                <input type="password"
                       id="confirmPassword"
                       th:field="*{confirmPassword}"
                       class="form-control"
                       required>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}">
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100"
                    th:text="#{password.reset.submit} ?: 'Cambiar contraseña'">
            </button>

            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/auth/forgot-password}" class="btn btn-link btn-sm p-0"
                   th:text="#{password.reset.back.forgot} ?: 'Solicitar nuevo enlace'"></a>

                <a th:href="@{/login}" class="btn btn-link btn-sm p-0"
                   th:text="#{password.reset.back.login} ?: 'Login'"></a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
