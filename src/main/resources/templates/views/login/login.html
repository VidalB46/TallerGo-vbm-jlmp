<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.header.brands} + ' - Login')}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">

        <h1 th:text="#{spring.security.ui.login.title} ?: 'Iniciar Sesión'"></h1>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger"
             th:text="#{spring.security.ui.login.error} ?: 'Usuario o contraseña incorrectos'"></div>

        <div th:if="${param.logout}" class="alert alert-success"
             th:text="#{spring.security.ui.login.logout-success} ?: 'Has cerrado sesión correctamente'"></div>

        <form th:action="@{/login}" method="post" class="mt-3">

            <div class="mb-3">
                <label for="username" class="form-label" th:text="#{spring.security.ui.login.username} ?: 'Email'"></label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       th:placeholder="#{spring.security.ui.login.username} ?: 'Introduce tu email'"
                       required
                       autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{spring.security.ui.login.password} ?: 'Contraseña'"></label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       th:placeholder="#{spring.security.ui.login.password} ?: 'Introduce tu contraseña'"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100"
                    th:text="#{spring.security.ui.login.submit} ?: 'Entrar'">
            </button>

            <div class="text-center my-3">
                <hr>
                <span class="px-2 text-muted">O también</span>
            </div>

            <div class="row justify-content-center">
                <div class="col-12">
                    <a href="/oauth2/authorization/github" class="btn btn-dark w-100">
                        <i class="bi bi-github"></i> Iniciar sesión con GitHub
                    </a>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/register}" class="btn btn-link btn-sm p-0"
                   th:text="#{spring.security.ui.login.register} ?: 'Crear cuenta'"></a>

                <a th:href="@{/auth/forgot-password}" class="btn btn-link btn-sm p-0"
                   th:text="#{spring.security.ui.login.forgot} ?: '¿Olvidaste tu contraseña?'"></a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
