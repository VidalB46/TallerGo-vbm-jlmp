<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - TallerGO')}"></head>

<style>
    /* ================================================================
       GOOGLE FONT
    ================================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    body.login-page {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #0d0d0d;
    }

    /* ================================================================
       KEYFRAMES
    ================================================================ */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-18px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
    }
    @keyframes gradientShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.4); }
        50%       { box-shadow: 0 0 0 8px rgba(192, 57, 43, 0); }
    }
    @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
    }
    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-6px); }
    }

    /* ================================================================
       TOP BAR — glassmorphism sobre el hero
    ================================================================ */
    .login-topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        animation: fadeDown 0.6s ease forwards;
    }
    .login-topbar .brand-name {
        font-size: 1.4rem;
        font-weight: 800;
        color: #ffffff;
        text-decoration: none;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: opacity 0.2s;
    }
    .login-topbar .brand-name:hover { opacity: 0.85; }
    .login-topbar .brand-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c0392b;
        margin-bottom: 2px;
        animation: pulse-red 2s infinite;
    }
    .login-topbar .topbar-nav {
        display: flex;
        gap: 1.5rem;
        list-style: none;
        margin: 0; padding: 0;
    }
    .login-topbar .topbar-nav a {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: color 0.2s;
    }
    .login-topbar .topbar-nav a:hover { color: #fff; }

    /* ================================================================
       HERO — imagen con overlay degradado
    ================================================================ */
    .login-hero {
        flex: 1;
        position: relative;
        background-image: url('https://images.unsplash.com/photo-1555215695-3004980ad54e?w=1920&q=90');
        background-size: cover;
        background-position: center 40%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8rem 1rem 4rem;
        min-height: 100vh;
        overflow: hidden;
    }

    /* Overlay degradado multicapa */
    .login-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
            135deg,
            rgba(0,0,0,0.72) 0%,
            rgba(10,10,20,0.55) 50%,
            rgba(0,0,0,0.68) 100%
        );
        z-index: 0;
    }

    /* Acento de luz roja en esquina */
    .login-hero::after {
        content: '';
        position: absolute;
        bottom: -80px;
        right: -80px;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.18) 0%, transparent 70%);
        z-index: 0;
        pointer-events: none;
    }

    /* ================================================================
       HERO CONTENT
    ================================================================ */
    .login-hero-content {
        position: relative;
        z-index: 1;
        text-align: center;
        width: 100%;
        max-width: 460px;
    }

    .login-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: rgba(192,57,43,0.15);
        border: 1px solid rgba(192,57,43,0.35);
        color: #e88080;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 0.3rem 0.9rem;
        border-radius: 99px;
        margin-bottom: 1rem;
        animation: fadeUp 0.5s 0.1s ease both;
    }
    .login-badge i { font-size: 0.7rem; }

    .login-hero-content h1 {
        color: #ffffff;
        font-size: 2.4rem;
        font-weight: 800;
        line-height: 1.15;
        margin-bottom: 0.5rem;
        text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        animation: fadeUp 0.6s 0.2s ease both;
    }
    .login-hero-content h1 span {
        background: linear-gradient(90deg, #e74c3c, #c0392b, #e74c3c);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
    }

    .login-hero-content p.subtitle {
        color: rgba(255,255,255,0.65);
        font-size: 0.95rem;
        font-weight: 400;
        margin-bottom: 2rem;
        animation: fadeUp 0.6s 0.3s ease both;
    }

    /* ================================================================
       LOGIN CARD — glassmorphism
    ================================================================ */
    .login-card {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 20px;
        padding: 2.2rem 2rem 1.8rem;
        box-shadow:
            0 2px 0 rgba(255,255,255,0.08) inset,
            0 20px 60px rgba(0,0,0,0.4),
            0 4px 16px rgba(0,0,0,0.2);
        width: 100%;
        animation: fadeUp 0.7s 0.35s ease both;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .login-card:hover {
        transform: translateY(-2px);
        box-shadow:
            0 2px 0 rgba(255,255,255,0.08) inset,
            0 28px 70px rgba(0,0,0,0.45),
            0 4px 20px rgba(0,0,0,0.25);
    }

    /* Floating label inputs */
    .input-group-float {
        position: relative;
        margin-bottom: 1.5rem; /* Ajustado margen para el mensaje de error */
    }
    .input-group-float .float-label {
        position: absolute;
        top: 50%;
        left: 0.9rem;
        transform: translateY(-50%);
        font-size: 0.88rem;
        font-weight: 500;
        color: #888;
        pointer-events: none;
        transition: all 0.2s ease;
        background: transparent;
        padding: 0 0.2rem;
    }
    .input-group-float .float-input {
        width: 100%;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        padding: 0.85rem 0.9rem 0.4rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: #fafafa;
        color: #1a1a1a;
        outline: none;
        transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .input-group-float .float-input:focus,
    .input-group-float .float-input:not(:placeholder-shown) {
        background: #ffffff;
        border-color: #c0392b;
    }
    .input-group-float .float-input:focus {
        box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
    }
    .input-group-float .float-input:focus ~ .float-label,
    .input-group-float .float-input:not(:placeholder-shown) ~ .float-label {
        top: 0.55rem;
        font-size: 0.72rem;
        color: #c0392b;
        font-weight: 600;
    }
    .input-group-float .input-icon {
        position: absolute;
        right: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        color: #bbb;
        font-size: 1rem;
        transition: color 0.2s;
        cursor: pointer;
    }
    .input-group-float .float-input:focus ~ .input-icon { color: #c0392b; }

    /* ESTILOS DE VALIDACIÓN JS */
    .was-validated .float-input:invalid {
        border-color: #dc3545;
        background-color: #fff8f8;
    }
    .invalid-feedback-custom {
        display: none;
        color: #dc3545;
        font-size: 0.78rem;
        margin-top: 0.25rem;
        text-align: left;
    }
    .was-validated .float-input:invalid ~ .invalid-feedback-custom {
        display: block;
    }

    /* Botón Entrar */
    .btn-login {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #c0392b 0%, #96281b 100%);
        border: none;
        color: #fff;
        font-weight: 700;
        font-size: 0.98rem;
        letter-spacing: 0.5px;
        padding: 0.8rem;
        border-radius: 10px;
        width: 100%;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.25s ease;
        box-shadow: 0 4px 18px rgba(192,57,43,0.35);
        margin-top: 0.4rem;
        font-family: inherit;
    }
    .btn-login::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0; height: 0;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
        opacity: 0;
    }
    .btn-login:active::after { width: 300px; height: 300px; opacity: 1; transition: 0s; }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); }
    .btn-login:active { transform: translateY(0); }

    /* Divisor */
    .login-divider {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin: 1.1rem 0 0.8rem;
        color: #bbb;
        font-size: 0.78rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    .login-divider::before,
    .login-divider::after { content: ''; flex: 1; height: 1px; background: #ececec; }

    /* Botón GitHub */
    .github-btn {
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        background: #0d0d0d; color: #fff; border: 1.5px solid #222; border-radius: 10px;
        padding: 0.65rem; width: 100%; font-size: 0.88rem; font-weight: 600;
        text-decoration: none; font-family: inherit; cursor: pointer;
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .github-btn:hover { background: #222; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.2); color: #fff; }

    /* Links extra */
    .extra-links { display: flex; justify-content: space-between; margin-top: 1.1rem; font-size: 0.82rem; }
    .extra-links a { color: #888; text-decoration: none; transition: color 0.2s; font-weight: 500; }
    .extra-links a:hover { color: #c0392b; }

    /* Alertas dentro de la card */
    .login-alert { border-radius: 10px; font-size: 0.85rem; padding: 0.65rem 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .login-alert.error { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.25); color: #a93226; }
    .login-alert.success { background: rgba(39,174,96,0.08); border: 1px solid rgba(39,174,96,0.25); color: #1e8449; }

    @media (max-width: 640px) {
        .login-hero-content h1 { font-size: 1.7rem; }
        .login-topbar .topbar-nav { display: none; }
        .login-card { padding: 1.6rem 1.3rem 1.4rem; }
    }
</style>

<body class="login-page">

<header class="login-topbar">
    <a th:href="@{/}" class="brand-name">TallerGO<span class="brand-dot"></span></a>
    <ul class="topbar-nav">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/workshops}">Para Talleres</a></li>
        <li><a th:href="@{/register}">Registrarse</a></li>
    </ul>
</header>

<section class="login-hero">
    <div class="login-hero-content">

        <div class="login-badge"><i class="bi bi-shield-check-fill"></i> Acceso seguro</div>
        <h1>Bienvenido a <span>TallerGO</span></h1>
        <p class="subtitle">Inicia sesión para gestionar tus citas y vehículos.</p>

        <div class="login-card">

            <div th:if="${errorMessage}" class="login-alert error"><i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span></div>
            <div th:if="${param.error}" class="login-alert error"><i class="bi bi-exclamation-circle-fill"></i><span th:text="#{spring.security.ui.login.error} ?: 'Usuario o contraseña incorrectos'"></span></div>
            <div th:if="${param.logout}" class="login-alert success"><i class="bi bi-check-circle-fill"></i><span th:text="#{spring.security.ui.login.logout-success} ?: 'Has cerrado sesión correctamente'"></span></div>

            <form th:action="@{/login}" method="post" autocomplete="on" class="needs-validation" novalidate>

                <div class="input-group-float">
                    <input type="email" id="username" name="username" class="float-input" placeholder=" " required autofocus>
                    <label for="username" class="float-label">Email</label>
                    <i class="bi bi-envelope input-icon"></i>
                    <div class="invalid-feedback-custom">El correo electrónico es obligatorio.</div>
                </div>

                <div class="input-group-float">
                    <input type="password" id="password" name="password" class="float-input" placeholder=" " required>
                    <label for="password" class="float-label">Contraseña</label>
                    <i class="bi bi-eye input-icon" id="togglePassword"></i>
                    <div class="invalid-feedback-custom">Debes introducir tu contraseña.</div>
                </div>

                <button type="submit" class="btn-login">Entrar &nbsp;→</button>

                <div class="login-divider">O continúa con</div>
                <a th:href="@{/oauth2/authorization/github}" class="github-btn"><i class="bi bi-github"></i> GitHub</a>

                <div class="extra-links">
                    <a th:href="@{/register}">Crear cuenta</a>
                    <a th:href="@{/auth/forgot-password}">¿Olvidaste la contraseña?</a>
                </div>
            </form>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput  = document.getElementById('password');
    if (toggleBtn && pwdInput) {
        toggleBtn.addEventListener('click', () => {
            const isPass = pwdInput.type === 'password';
            pwdInput.type = isPass ? 'text' : 'password';
            toggleBtn.className = isPass ? 'bi bi-eye-slash input-icon' : 'bi bi-eye input-icon';
        });
    }
    const hero = document.querySelector('.login-hero');
    if (hero) {
        document.addEventListener('mousemove', (e) => {
            const xPct = (e.clientX / window.innerWidth  - 0.5) * 6;
            const yPct = (e.clientY / window.innerHeight - 0.5) * 4;
            hero.style.backgroundPosition = `calc(40% + ${xPct}px) calc(40% + ${yPct}px)`;
        });
    }
</script>
</body>
</html>
