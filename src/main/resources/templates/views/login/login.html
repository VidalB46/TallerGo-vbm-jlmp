<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.header.brands} + ' - Login')}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/header :: header}"></header>

<main class="login-page">
    <section class="login-card">
        <div class="brand-header">
            <span class="hero-badge"><i class="bi bi-shield-lock"></i> Acceso seguro</span>
            <h1>Taller <span>Go</span></h1>
            <p>Entra en tu espacio de trabajo con una interfaz moderna, clara y preparada para el ritmo diario del taller.</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger"
             th:text="#{spring.security.ui.login.error} ?: 'Usuario o contraseña incorrectos'"></div>

        <div th:if="${param.logout}" class="alert alert-success"
             th:text="#{spring.security.ui.login.logout-success} ?: 'Has cerrado sesión correctamente'"></div>

        <form th:action="@{/login}" method="post" class="mt-3">

            <div class="mb-3">
                <label for="username" class="form-label" th:text="#{spring.security.ui.login.username} ?: 'Email'"></label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       th:placeholder="#{spring.security.ui.login.username} ?: 'Introduce tu email'"
                       required
                       autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{spring.security.ui.login.password} ?: 'Contraseña'"></label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       th:placeholder="#{spring.security.ui.login.password} ?: 'Introduce tu contraseña'"
                       required>
            </div>

            <button type="submit"
                    class="btn-login"
                    th:text="#{spring.security.ui.login.submit} ?: 'Entrar'">
            </button>

            <div class="login-divider"><span>o continua con</span></div>

            <a th:href="@{/oauth2/authorization/github}" class="btn-github text-decoration-none">
                <i class="bi bi-github"></i>
                <span>Iniciar sesion con GitHub</span>
            </a>

            <div class="login-links">
                <a th:href="@{/register}" class="btn btn-link btn-sm p-0"
                   th:text="#{spring.security.ui.login.register} ?: 'Crear cuenta'"></a>

                <a th:href="@{/auth/forgot-password}" class="btn btn-link btn-sm p-0"
                   th:text="#{spring.security.ui.login.forgot} ?: '¿Olvidaste tu contraseña?'"></a>
            </div>

        </form>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
