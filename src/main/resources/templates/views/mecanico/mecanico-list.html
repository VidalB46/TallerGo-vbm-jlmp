<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="fragments/head :: head (#{msg.mecanico.list.title})"></head>

<body class="d-flex flex-column h-100">

<header th:replace="fragments/header :: header"></header>

<main class="list-page" style="padding-top: 125px;">
    <div class="list-card">
        <h1 th:text="#{msg.mecanico.list.title}"></h1>
        <a th:href="@{/mecanicos/new}" class="btn btn-success mb-3" th:text="#{msg.mecanico.action.new}"></a>

        <table class="table table-bordered table-striped mt-3">
            <thead>
            <tr>
                <th th:text="#{msg.mecanico.list.field.id}"></th>
                <th th:text="#{msg.mecanico.list.field.nombre}"></th>
                <th th:text="#{msg.mecanico.list.field.especialidad}"></th>
                <th th:text="#{msg.mecanico.list.field.taller}"></th>
                <th th:text="#{msg.mecanico.list.field.acciones}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="mecanico : ${listMecanicos}">
                <td th:text="${mecanico.id}"></td>
                <td th:text="${mecanico.nombre}"></td>
                <td th:text="${mecanico.especialidad}"></td>
                <td th:text="${mecanico.tallerNombre}"></td>
                <td style="white-space: nowrap;">
                    <div class="d-inline-flex gap-1">
                        <a th:href="@{/mecanicos/detail(id=${mecanico.id})}" class="btn btn-outline-secondary btn-sm" th:text="#{msg.mecanico.action.detail}"></a>
                        <a th:href="@{/mecanicos/edit(id=${mecanico.id})}" class="btn btn-dark btn-sm" th:text="#{msg.mecanico.action.edit}"></a>
                        <form th:action="@{/mecanicos/delete}" method="post" class="m-0 p-0">
                            <input type="hidden" name="id" th:value="${mecanico.id}" />
                            <button type="submit" class="btn btn-danger btn-sm"
                                    th:onclick="|return confirm('#{msg.mecanico.delete.confirm}');|"
                                    th:text="#{msg.mecanico.action.delete}"></button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listMecanicos)}">
                <td colspan="5"><em th:text="#{msg.mecanico.list.empty}"></em></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
