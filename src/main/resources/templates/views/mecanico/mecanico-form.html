
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="fragments/head :: head (#{msg.mecanico.form.title.new})"></head>

<body class="d-flex flex-column h-100">

<header th:replace="fragments/header :: header"></header>

<main class="form-page" style="padding-top: 125px;">
    <div class="form-card">

        <!-- Título dinámico -->
        <h1 th:text="${mecanico != null and mecanico.id != null} ? #{msg.mecanico.form.title.edit} : #{msg.mecanico.form.title.new}"></h1>

        <!-- Mensaje de error global -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!-- Formulario -->
        <form th:action="${mecanico != null and mecanico.id != null} ? @{/mecanicos/update} : @{/mecanicos/insert}"
              th:object="${mecanico}" method="post" class="mt-3">

            <!-- ID oculto -->
            <input type="hidden" th:field="*{id}" />

            <!-- Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label" th:text="#{msg.mecanico.form.field.nombre}"></label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" th:placeholder="#{msg.mecanico.form.field.nombre}" />
                <div th:if="${#fields.hasErrors('nombre')}" class="text-danger" th:errors="*{nombre}"></div>
            </div>

            <!-- Especialidad -->
            <div class="mb-3">
                <label for="especialidad" class="form-label" th:text="#{msg.mecanico.form.field.especialidad}"></label>
                <input type="text" id="especialidad" th:field="*{especialidad}" class="form-control" th:placeholder="#{msg.mecanico.form.field.especialidad}" />
                <div th:if="${#fields.hasErrors('especialidad')}" class="text-danger" th:errors="*{especialidad}"></div>
            </div>

            <!-- Taller -->
            <div class="mb-3">
                <label for="tallerId" class="form-label" th:text="#{msg.mecanico.form.field.taller}"></label>
                <select id="tallerId" class="form-select" th:field="*{tallerId}">
                    <option value="" th:text="#{msg.mecanico.form.select.taller}"></option>
                    <option th:each="taller : ${talleres}" th:value="${taller.id}" th:text="${taller.nombre}"></option>
                </select>
                <div th:if="${#fields.hasErrors('tallerId')}" class="text-danger" th:errors="*{tallerId}"></div>
            </div>

            <!-- Botón submit -->
            <button type="submit" class="btn btn-primary"
                    th:text="${mecanico != null and mecanico.id != null} ? #{msg.mecanico.action.update} : #{msg.mecanico.action.create}"></button>

            <!-- Volver al listado -->
            <a th:href="@{/mecanicos}" class="btn btn-secondary" th:text="#{msg.mecanico.action.back}"></a>

        </form>

    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
