<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{msg.review-list.title})}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="list-page">
    <div class="list-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 th:text="#{msg.review-list.title}">Opiniones de los clientes</h1>
                <h4 class="text-muted" th:text="${workshop.name}">Nombre Taller</h4>
            </div>
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/reviews/new(workshopId=${workshop.id})}" class="btn btn-success">
                <i class="bi bi-pencil-square"></i> Escribir Reseña
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>

        <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info text-center">
            Este taller aún no tiene valoraciones. ¡Sé el primero en opinar!
        </div>

        <div th:unless="${#lists.isEmpty(reviews)}" class="row row-cols-1 gap-3">
            <div class="col" th:each="rev : ${reviews}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0 text-primary">
                                <i class="bi bi-person-circle"></i> <span th:text="${rev.userEmail}">Usuario</span>
                            </h5>
                            <span class="badge bg-warning text-dark fs-6">
                                <span th:text="${rev.rating}"></span> ⭐
                            </span>
                        </div>
                        <p class="card-text text-secondary mt-3" th:text="${rev.comment}">Comentario del usuario...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/workshops}" class="btn btn-outline-secondary">Volver a Talleres</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
