<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{spring.security.ui.login.register} + ' - Taller Go')}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">

        <h1 th:text="#{spring.security.ui.login.register} ?: 'Crear Cuenta'"></h1>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${userDto}" method="post" class="mt-3 needs-validation" novalidate>

            <div class="mb-3">
                <label for="email" class="form-label" th:text="#{password.reset.email.label} ?: 'Email'"></label>
                <input type="email" id="email" th:field="*{email}" class="form-control"
                       th:placeholder="#{password.reset.email.placeholder}" required autofocus>
                <div class="invalid-feedback">Por favor, introduce un correo electrónico válido.</div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{spring.security.ui.login.password} ?: 'Contraseña'"></label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required>
                <div class="invalid-feedback">La contraseña es obligatoria.</div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label" th:text="#{password.reset.confirmPassword.label} ?: 'Confirmar Contraseña'"></label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required>
                <div class="invalid-feedback">Debes confirmar tu contraseña.</div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100" th:text="#{spring.security.ui.login.register} ?: 'Registrarse'"></button>

            <div class="text-center mt-4">
                <a th:href="@{/login}" class="text-decoration-none small">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
