<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head(#{msg.user-form.title})}"></head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">

        <h1 th:text="${user.id == null} ? #{msg.user-form.add} : #{msg.user-form.edit}">
            Formulario Usuario
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="${user.id == null} ? @{/users/insert} : @{/users/update}"
              th:object="${user}" method="post" class="mt-3">

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="email" class="form-label" th:text="#{msg.user-form.email}">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control"
                       th:placeholder="#{msg.user-form.email.placeholder}" required />
                <div th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="roles" class="form-label" th:text="#{msg.user-form.roles}">Roles</label>
                <select id="roles" class="form-select" multiple th:field="*{roleIds}" required>
                    <option th:each="role : ${allRoles}"
                            th:value="${role.id}"
                            th:text="${role.displayName}"></option>
                </select>
                <small class="text-muted" th:text="#{msg.user-form.roles.help}">Presiona Ctrl para multiselección</small>
            </div>

            <hr class="my-4">

            <div class="row">
                <div class="col-md-6">
                    <div class="form-check mb-2">
                        <input th:field="*{active}" id="active" class="form-check-input" type="checkbox" />
                        <label for="active" class="form-check-label" th:text="#{msg.user-form.active}">Activo</label>
                    </div>
                    <div class="form-check mb-2">
                        <input th:field="*{accountNonLocked}" id="accountNonLocked" class="form-check-input" type="checkbox" />
                        <label for="accountNonLocked" class="form-check-label" th:text="#{msg.user-form.accountNonLocked}">No bloqueado</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check mb-2">
                        <input th:field="*{emailVerified}" id="emailVerified" class="form-check-input" type="checkbox" />
                        <label for="emailVerified" class="form-check-label" th:text="#{msg.user-form.emailVerified}">Email verificado</label>
                    </div>
                    <div class="form-check mb-2">
                        <input th:field="*{mustChangePassword}" id="mustChangePassword" class="form-check-input" type="checkbox" />
                        <label for="mustChangePassword" class="form-check-label" th:text="#{msg.user-form.mustChangePassword}">Cambio pass obligatorio</label>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"
                        th:text="${user.id == null} ? #{msg.user-form.create} : #{msg.user-form.update}">
                    Guardar
                </button>
                <a th:href="@{/users}" class="btn btn-secondary" th:text="#{msg.user-form.returnback}">
                    Volver
                </a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
