<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${user.id != null} ? 'TallerGO — Editar Usuario' : 'TallerGO — Nuevo Usuario'">TallerGO — Usuario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="user-form-page">

<nav th:replace="~{fragments/navbar :: navbar('users')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Administración</div>
        <h1 th:text="${user.id != null} ? 'Editar Usuario' : 'Nuevo Usuario'">Usuario</h1>
        <p th:text="${user.id != null} ? 'Modifica los datos de la cuenta.' : 'Crea una nueva cuenta de usuario.'"></p>
    </div>
</div>

<main class="form-main">
    <div class="form-card">
        <div class="form-card-header">
            <i class="bi bi-person-gear"></i>
            <h2 th:text="${user.id != null} ? 'Editar cuenta' : 'Crear cuenta'">Cuenta</h2>
        </div>

        <form th:action="${user.id != null} ? @{/users/update} : @{/users/insert}"
              th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-card-body">

                <div class="alert-error" th:if="${errorMessage}">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}" placeholder="usuario@ejemplo.com" required/>
                </div>

                <div class="form-group">
                    <label for="roleIds">Roles</label>
                    <select id="roleIds" name="roleIds" class="form-control" multiple>
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.displayName}"
                                th:selected="${user.roleIds != null and user.roleIds.contains(role.id)}">
                        </option>
                    </select>
                    <div class="form-hint">Mantén Ctrl (o Cmd) para seleccionar varios roles.</div>
                </div>

                <div class="form-group">
                    <label>Opciones de cuenta</label>
                    <div class="checks-grid">
                        <label class="check-item">
                            <input type="checkbox" th:field="*{active}"/>
                            <span><i class="bi bi-toggle-on"></i> Activo</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" th:field="*{accountNonLocked}"/>
                            <span><i class="bi bi-unlock"></i> Cuenta desbloqueada</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" th:field="*{emailVerified}"/>
                            <span><i class="bi bi-envelope-check"></i> Email verificado</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" th:field="*{mustChangePassword}"/>
                            <span><i class="bi bi-key"></i> Debe cambiar contraseña</span>
                        </label>
                    </div>
                </div>

            </div>

            <div class="form-card-footer">
                <a th:href="@{/users}" class="btn-cancel"><i class="bi bi-x"></i> Cancelar</a>
                <button type="submit" class="btn-submit">
                    <i class="bi bi-check2"></i>
                    <span th:text="${user.id != null} ? 'Guardar cambios' : 'Crear usuario'">Guardar</span>
                </button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
