<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Usuarios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="users-page">

<nav th:replace="~{fragments/navbar :: navbar('users')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1.5rem;">
        <div class="page-hero-text">
            <div class="page-label">Administración</div>
            <h1>Usuarios</h1>
            <p>Gestiona las cuentas y permisos de los usuarios del sistema.</p>
        </div>
        <a th:href="@{/users/new}" class="btn-new" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus-fill"></i> Nuevo Usuario
        </a>
    </div>
</div>

<main class="users-main">

    <div th:if="${errorMessage}" class="alert-error-custom">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="users-table-wrap table-scroll">
        <table>
            <thead>
            <tr>
                <th th:with="order=${page.sort.getOrderFor('id')}, dir=${order != null ? order.direction.name().toLowerCase() : 'asc'}, nextDir=${dir == 'asc' ? 'desc' : 'asc'}">
                    <a th:href="@{/users(page=${page.number}, size=${page.size}, sort=${'id,' + nextDir})}">
                        ID <span th:if="${order != null}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th th:with="order=${page.sort.getOrderFor('email')}, dir=${order != null ? order.direction.name().toLowerCase() : 'asc'}, nextDir=${dir == 'asc' ? 'desc' : 'asc'}">
                    <a th:href="@{/users(page=${page.number}, size=${page.size}, sort=${'email,' + nextDir})}">
                        Email <span th:if="${order != null}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>Roles</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${page.content}">
                <td th:text="${u.id}"></td>
                <td>
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <i class="bi bi-person-circle" style="color:#c0392b;font-size:1.1rem;"></i>
                        <span th:text="${u.email}"></span>
                    </div>
                </td>
                <td>
                    <span th:each="role : ${u.roles}" class="badge-role" th:text="${role}"></span>
                </td>
                <td>
                    <span th:if="${u.active}" class="badge-active"><i class="bi bi-check-circle-fill"></i> Activo</span>
                    <span th:unless="${u.active}" class="badge-inactive"><i class="bi bi-x-circle-fill"></i> Inactivo</span>
                </td>
                <td>
                    <div class="td-actions">
                        <a th:href="@{/users/detail(id=${u.id})}" class="btn-view-sm"><i class="bi bi-eye"></i> Ver</a>
                        <a th:href="@{/users/edit(id=${u.id})}" class="btn-edit-sm"><i class="bi bi-pencil"></i> Editar</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="pagination-bar" th:if="${page.totalPages > 1}">
        <a class="page-btn" th:classappend="${page.first} ? 'disabled'" th:href="@{/users(page=${page.number - 1}, size=${page.size}, sort=${sortParam})}"><i class="bi bi-chevron-left"></i></a>
        <a class="page-btn" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}" th:classappend="${i == page.number} ? 'active'" th:href="@{/users(page=${i}, size=${page.size}, sort=${sortParam})}" th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${page.last} ? 'disabled'" th:href="@{/users(page=${page.number + 1}, size=${page.size}, sort=${sortParam})}"><i class="bi bi-chevron-right"></i></a>
    </nav>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
