<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Usuarios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.users-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    body.users-page > nav, body.users-page > div, body.users-page > main, body.users-page > footer { flex: unset !important; width: 100%; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero-text h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero-text p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .btn-new { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, #c0392b, #96281b); color: #fff; font-weight: 700; font-size: 0.88rem; padding: 0.7rem 1.4rem; border-radius: 10px; text-decoration: none; box-shadow: 0 4px 16px rgba(192,57,43,0.35); transition: transform 0.2s, box-shadow 0.2s; white-space: nowrap; }
    .btn-new:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.45); color: #fff; }
    .users-main { max-width: 1200px; margin: 2.5rem auto; padding: 0 2rem 5rem; animation: fadeUp 0.5s ease both; }
    .alert-error-custom { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.25); color: #c0392b; border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    /* TABLE */
    .users-table-wrap { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #111; }
    thead th { color: rgba(255,255,255,0.6); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 0.9rem 1.2rem; text-align: left; }
    thead th a { color: rgba(255,255,255,0.6); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    thead th a:hover { color: #fff; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 0.9rem 1.2rem; font-size: 0.88rem; color: #333; vertical-align: middle; }
    .badge-role { display: inline-flex; align-items: center; background: rgba(52,152,219,0.1); color: #2980b9; border: 1px solid rgba(52,152,219,0.2); font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 0.3rem; }
    .badge-active { background: rgba(39,174,96,0.1); color: #1e8449; border: 1px solid rgba(39,174,96,0.25); font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 0.3rem; }
    .badge-inactive { background: rgba(192,57,43,0.08); color: #c0392b; border: 1px solid rgba(192,57,43,0.2); font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 0.3rem; }
    .td-actions { display: flex; gap: 0.4rem; }
    .btn-view-sm { display: inline-flex; align-items: center; gap: 0.3rem; background: #111; color: #fff; font-size: 0.74rem; font-weight: 600; padding: 0.38rem 0.7rem; border-radius: 7px; text-decoration: none; transition: background 0.2s; }
    .btn-view-sm:hover { background: #333; color: #fff; }
    .btn-edit-sm { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(52,152,219,0.09); color: #2980b9; border: 1.5px solid rgba(52,152,219,0.2); font-size: 0.74rem; font-weight: 600; padding: 0.38rem 0.7rem; border-radius: 7px; text-decoration: none; transition: all 0.2s; }
    .btn-edit-sm:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    /* Paginación */
    .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 0.4rem; margin-top: 2rem; flex-wrap: wrap; }
    .page-btn { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; text-decoration: none; border: 1.5px solid #e0e0e0; color: #555; background: #fff; transition: all 0.2s; }
    .page-btn:hover { border-color: #c0392b; color: #c0392b; }
    .page-btn.active { background: #c0392b; border-color: #c0392b; color: #fff; }
    .page-btn.disabled { opacity: 0.35; pointer-events: none; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .page-hero-inner { flex-direction: column; align-items: flex-start; } .users-main { padding: 0 1rem 3rem; } }
</style>
</head>
<body class="users-page">

<nav th:replace="~{fragments/navbar :: navbar('users')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-hero-text">
            <div class="page-label">Administración</div>
            <h1>Usuarios</h1>
            <p>Gestiona las cuentas y permisos de los usuarios del sistema.</p>
        </div>
        <a th:href="@{/users/new}" class="btn-new" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus-fill"></i> Nuevo Usuario
        </a>
    </div>
</div>

<main class="users-main">

    <div th:if="${errorMessage}" class="alert-error-custom">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="users-table-wrap">
        <table>
            <thead>
                <tr>
                    <th th:with="order=${page.sort.getOrderFor('id')}, dir=${order != null ? order.direction.name().toLowerCase() : 'asc'}, nextDir=${dir == 'asc' ? 'desc' : 'asc'}">
                        <a th:href="@{/users(page=${page.number}, size=${page.size}, sort=${'id,' + nextDir})}">
                            ID <span th:if="${order != null}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th th:with="order=${page.sort.getOrderFor('email')}, dir=${order != null ? order.direction.name().toLowerCase() : 'asc'}, nextDir=${dir == 'asc' ? 'desc' : 'asc'}">
                        <a th:href="@{/users(page=${page.number}, size=${page.size}, sort=${'email,' + nextDir})}">
                            Email <span th:if="${order != null}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th>Roles</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${page.content}">
                    <td th:text="${u.id}"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <i class="bi bi-person-circle" style="color:#c0392b;font-size:1.1rem;"></i>
                            <span th:text="${u.email}"></span>
                        </div>
                    </td>
                    <td>
                        <span th:each="role : ${u.roles}" class="badge-role" th:text="${role}"></span>
                    </td>
                    <td>
                        <span th:if="${u.active}" class="badge-active"><i class="bi bi-check-circle-fill"></i> Activo</span>
                        <span th:unless="${u.active}" class="badge-inactive"><i class="bi bi-x-circle-fill"></i> Inactivo</span>
                    </td>
                    <td>
                        <div class="td-actions">
                            <a th:href="@{/users/detail(id=${u.id})}" class="btn-view-sm"><i class="bi bi-eye"></i> Ver</a>
                            <a th:href="@{/users/edit(id=${u.id})}" class="btn-edit-sm"><i class="bi bi-pencil"></i> Editar</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <nav class="pagination-bar" th:if="${page.totalPages > 1}">
        <a class="page-btn" th:classappend="${page.first} ? 'disabled'" th:href="@{/users(page=${page.number - 1}, size=${page.size}, sort=${sortParam})}"><i class="bi bi-chevron-left"></i></a>
        <a class="page-btn" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}" th:classappend="${i == page.number} ? 'active'" th:href="@{/users(page=${i}, size=${page.size}, sort=${sortParam})}" th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${page.last} ? 'disabled'" th:href="@{/users(page=${page.number + 1}, size=${page.size}, sort=${sortParam})}"><i class="bi bi-chevron-right"></i></a>
    </nav>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
