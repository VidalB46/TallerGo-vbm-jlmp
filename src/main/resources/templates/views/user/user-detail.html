<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle Usuario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.user-detail-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; display: block !important; height: auto !important; min-height: 100vh; }
    body.user-detail-page > nav, body.user-detail-page > div, body.user-detail-page > main, body.user-detail-page > footer { flex: unset !important; width: 100%; }
    .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .page-hero { margin-top: 0; padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-hero-inner { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
    .page-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #c0392b; margin-bottom: 0.4rem; }
    .page-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .page-hero p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .detail-main { max-width: 900px; margin: 2.5rem auto; padding: 0 2rem 5rem; animation: fadeUp 0.5s ease both; }
    .detail-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); overflow: hidden; }
    .detail-card-visual { height: 120px; background: linear-gradient(135deg, #1a1a1a 0%, #111 100%); display: flex; align-items: center; justify-content: center; }
    .detail-card-visual i { font-size: 4rem; color: rgba(255,255,255,0.1); }
    .detail-card-body { padding: 2rem 2.5rem; }
    .user-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1.5px solid #f0f0f0; }
    .user-email { font-size: 1.2rem; font-weight: 800; color: #111; display: flex; align-items: center; gap: 0.5rem; }
    .user-email i { color: #c0392b; }
    .badge-active { background: rgba(39,174,96,0.1); color: #1e8449; border: 1px solid rgba(39,174,96,0.25); font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 0.3rem; }
    .badge-inactive { background: rgba(192,57,43,0.08); color: #c0392b; border: 1px solid rgba(192,57,43,0.2); font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 0.3rem; }
    .detail-section { margin-bottom: 2rem; }
    .detail-section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c0392b; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .detail-field label { font-size: 0.72rem; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.2rem; }
    .detail-field span { font-size: 0.93rem; font-weight: 600; color: #111; display: flex; align-items: center; gap: 0.4rem; }
    .detail-field span i { color: #c0392b; }
    .badge-role { display: inline-flex; align-items: center; background: rgba(52,152,219,0.1); color: #2980b9; border: 1px solid rgba(52,152,219,0.2); font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px; text-transform: uppercase; margin-right: 0.3rem; }
    .no-profile { background: #f8f8fa; border: 1.5px solid #ebebee; border-radius: 12px; padding: 1.2rem 1.4rem; font-size: 0.88rem; color: #aaa; font-style: italic; }
    .detail-card-footer { padding: 1.2rem 2.5rem; border-top: 1.5px solid #f0f0f0; display: flex; gap: 0.75rem; }
    .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; background: #f4f4f6; color: #555; font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
    .btn-back:hover { background: #eaeaea; color: #111; }
    .btn-edit { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(52,152,219,0.09); color: #2980b9; border: 1.5px solid rgba(52,152,219,0.2); font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; transition: all 0.2s; }
    .btn-edit:hover { background: #2980b9; color: #fff; border-color: #2980b9; }
    @media (max-width: 640px) { .page-hero { padding: calc(3rem + 64px) 1.2rem 3.5rem; } .detail-main { padding: 0 1rem 3rem; } .detail-grid { grid-template-columns: 1fr; } .detail-card-body { padding: 1.5rem; } .detail-card-footer { padding: 1rem 1.5rem; } }
</style>
</head>
<body class="user-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('users')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Administración</div>
        <h1>Detalle de Usuario</h1>
        <p>Información completa de la cuenta.</p>
    </div>
</div>

<main class="detail-main">
    <div class="detail-card">
        <div class="detail-card-visual">
            <i class="bi bi-person-circle"></i>
        </div>
        <div class="detail-card-body">

            <div class="user-header">
                <div class="user-email">
                    <i class="bi bi-envelope-fill"></i>
                    <span th:text="${user.email}"></span>
                </div>
                <span th:if="${user.active}" class="badge-active"><i class="bi bi-check-circle-fill"></i> Activo</span>
                <span th:unless="${user.active}" class="badge-inactive"><i class="bi bi-x-circle-fill"></i> Inactivo</span>
            </div>

            <div class="detail-section">
                <div class="detail-section-title"><i class="bi bi-shield-lock"></i> Cuenta</div>
                <div class="detail-grid">
                    <div class="detail-field">
                        <label>ID</label>
                        <span><i class="bi bi-hash"></i><span th:text="${user.id}"></span></span>
                    </div>
                    <div class="detail-field">
                        <label>Roles</label>
                        <span>
                            <span th:each="r : ${user.roles}" class="badge-role" th:text="${r}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-section-title"><i class="bi bi-person"></i> Perfil Personal</div>
                <div class="no-profile" th:if="${user.firstName == null}">Este usuario no ha configurado su perfil todavía.</div>
                <div class="detail-grid" th:if="${user.firstName != null}">
                    <div class="detail-field">
                        <label>Nombre</label>
                        <span><i class="bi bi-person-badge"></i><span th:text="${user.firstName} + ' ' + ${user.lastName}"></span></span>
                    </div>
                    <div class="detail-field">
                        <label>Teléfono</label>
                        <span><i class="bi bi-telephone"></i><span th:text="${user.phoneNumber} ?: 'N/A'"></span></span>
                    </div>
                </div>
            </div>

        </div>
        <div class="detail-card-footer">
            <a th:href="@{/users}" class="btn-back"><i class="bi bi-arrow-left"></i> Volver</a>
            <a th:href="@{/users/edit(id=${user.id})}" class="btn-edit"><i class="bi bi-pencil"></i> Editar</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
