<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — Detalle Usuario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>
<body class="user-detail-page">

<nav th:replace="~{fragments/navbar :: navbar('users')}"></nav>

<div class="page-hero">
    <div class="page-hero-inner">
        <div class="page-label">Administración</div>
        <h1>Detalle de Usuario</h1>
        <p>Información completa de la cuenta.</p>
    </div>
</div>

<main class="detail-main">
    <div class="detail-card">
        <div class="detail-card-visual">
            <i class="bi bi-person-circle"></i>
        </div>
        <div class="detail-card-body">

            <div class="user-header">
                <div class="user-email">
                    <i class="bi bi-envelope-fill"></i>
                    <span th:text="${user.email}"></span>
                </div>
                <span th:if="${user.active}" class="badge-active"><i class="bi bi-check-circle-fill"></i> Activo</span>
                <span th:unless="${user.active}" class="badge-inactive"><i class="bi bi-x-circle-fill"></i> Inactivo</span>
            </div>

            <div class="detail-section">
                <div class="detail-section-title"><i class="bi bi-shield-lock"></i> Cuenta</div>
                <div class="detail-grid">
                    <div class="detail-field">
                        <label>ID</label>
                        <span><i class="bi bi-hash"></i><span th:text="${user.id}"></span></span>
                    </div>
                    <div class="detail-field">
                        <label>Roles</label>
                        <span>
                            <span th:each="r : ${user.roles}" class="badge-role" th:text="${r}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-section-title"><i class="bi bi-person"></i> Perfil Personal</div>
                <div class="no-profile" th:if="${user.firstName == null}">Este usuario no ha configurado su perfil todavía.</div>
                <div class="detail-grid" th:if="${user.firstName != null}">
                    <div class="detail-field">
                        <label>Nombre</label>
                        <span><i class="bi bi-person-badge"></i><span th:text="${user.firstName} + ' ' + ${user.lastName}"></span></span>
                    </div>
                    <div class="detail-field">
                        <label>Teléfono</label>
                        <span><i class="bi bi-telephone"></i><span th:text="${user.phoneNumber} ?: 'N/A'"></span></span>
                    </div>
                </div>
            </div>

        </div>
        <div class="detail-card-footer">
            <a th:href="@{/users}" class="btn-back"><i class="bi bi-arrow-left"></i> Volver</a>
            <a th:href="@{/users/edit(id=${user.id})}" class="btn-edit"><i class="bi bi-pencil"></i> Editar</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
