<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Taller Go - Detalle Usuario')}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card">
        <h1>Detalle de Usuario: <span th:text="${user.email}"></span></h1>

        <div class="row mt-4">
            <div class="col-md-6">
                <h5 class="border-bottom pb-2">Cuenta de Acceso</h5>
                <dl class="row">
                    <dt class="col-sm-5">ID</dt>
                    <dd class="col-sm-7" th:text="${user.id}"></dd>

                    <dt class="col-sm-5">Estado</dt>
                    <dd class="col-sm-7">
                        <span th:if="${user.active}" class="badge bg-success">Activa</span>
                        <span th:unless="${user.active}" class="badge bg-danger">Inactiva</span>
                    </dd>

                    <dt class="col-sm-5">Roles</dt>
                    <dd class="col-sm-7">
                        <ul class="list-unstyled">
                            <li th:each="r : ${user.roles}" th:text="${r}"></li>
                        </ul>
                    </dd>
                </dl>
            </div>
            <div class="col-md-6 border-start">
                <h5 class="border-bottom pb-2">Perfil Personal</h5>
                <div th:if="${user.firstName == null}" class="alert alert-light border">Este usuario no ha configurado su perfil.</div>
                <dl class="row" th:if="${user.firstName != null}">
                    <dt class="col-sm-5">Nombre</dt>
                    <dd class="col-sm-7" th:text="${user.firstName} + ' ' + ${user.lastName}"></dd>

                    <dt class="col-sm-5">Teléfono</dt>
                    <dd class="col-sm-7" th:text="${user.phoneNumber} ?: 'N/A'"></dd>
                </dl>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/users}" class="btn btn-secondary">Volver al listado</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
