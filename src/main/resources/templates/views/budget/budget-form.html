<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{msg.budget-form.title}">Generar Presupuesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="budget-form-page">
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="page-hero">
    <div class="page-label">Valoración</div>
    <h1><i class="bi bi-calculator"></i> <span th:text="#{msg.budget-form.title}">Generar Presupuesto</span></h1>
</div>

<main class="form-main">
    <div th:if="${error}" class="alert alert-danger mb-4 rounded-3 fw-medium shadow-sm"><i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span></div>

    <div class="custom-card">
        <form th:action="@{/budgets/new}" th:object="${budget}" method="post" id="budgetForm" class="needs-validation" novalidate>
            <input type="hidden" th:field="*{repairId}" />

            <div class="mb-4">
                <label for="totalGross" class="form-label">Total Bruto</label>
                <div class="input-group-custom">
                    <i class="bi bi-currency-euro"></i>
                    <input type="number" step="0.01" min="0" th:field="*{totalGross}" id="totalGross" class="form-control-custom" required
                           th:classappend="${#fields.hasErrors('totalGross')} ? 'is-invalid'" placeholder="Ej: 100.00"/>
                </div>
                <div class="invalid-feedback" style="display:none;">Introduce un importe bruto válido.</div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalGross')}" th:errors="*{totalGross}" style="display:block;"></div>
            </div>

            <div class="mb-5">
                <label for="totalNet" class="form-label text-primary" th:text="#{msg.budget-detail.total}">Total a pagar (con IVA)</label>
                <div class="input-group-custom">
                    <i class="bi bi-currency-euro text-primary"></i>
                    <input type="number" step="0.01" min="0" th:field="*{totalNet}" id="totalNet" class="form-control-custom" required
                           th:classappend="${#fields.hasErrors('totalNet')} ? 'is-invalid'" placeholder="Ej: 121.00"/>
                </div>
                <div class="invalid-feedback" style="display:none;">Introduce el total neto final.</div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalNet')}" th:errors="*{totalNet}" style="display:block;"></div>
            </div>

            <div class="mb-4">
                <label for="notes" class="form-label">Observaciones para el cliente</label>
                <textarea th:field="*{notes}" id="notes" class="form-control-custom" rows="3" placeholder="Ej: Se ha detectado un desgaste inusual en las correas, se recomienda revisión futura..."></textarea>
                <div class="form-text text-muted" style="font-size: 0.8rem; margin-top: 0.25rem;">
                    Usa este campo para explicar o justificar los conceptos añadidos.
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                <a th:href="@{/repairs/{id}(id=*{repairId})}" class="btn-modern btn-outline">Cancelar</a>
                <button type="submit" class="btn-modern btn-warning-modern">
                    <i class="bi bi-save"></i> Guardar Presupuesto
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
