<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{msg.budget-form.title}">Generar Presupuesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body.budget-form-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; min-height: 100vh; }
        .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .page-hero { padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); text-align: center; }
        .page-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #ffc107; margin-bottom: 0.5rem; }
        .page-hero h1 { font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

        .form-main { max-width: 500px; margin: -2.5rem auto 5rem; padding: 0 1.5rem; animation: fadeUp 0.5s ease both; position: relative; z-index: 10; }
        .custom-card { background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); overflow: hidden; padding: 2.5rem; }

        .form-label { font-size: 0.85rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; display: block; }
        .input-group-custom { position: relative; display: flex; align-items: center; }
        .input-group-custom i { position: absolute; left: 1rem; color: #888; font-size: 1.2rem; }
        .form-control-custom { width: 100%; border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 0.8rem 1rem 0.8rem 3rem; font-size: 1.1rem; color: #111; font-weight: 600; transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa; }
        .form-control-custom:focus { border-color: #ffc107; box-shadow: 0 0 0 4px rgba(255,193,7,0.15); outline: none; background: #fff; }
        .is-invalid { border-color: #dc3545; background-color: #fff8f8; }
        .invalid-feedback { font-size: 0.8rem; color: #dc3545; margin-top: 0.4rem; font-weight: 500; }

        .btn-modern { border-radius: 8px; padding: 0.8rem 1.5rem; font-weight: 600; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.15s, box-shadow 0.15s; border: none; cursor: pointer; text-decoration: none;}
        .btn-modern:hover { transform: translateY(-2px); }
        .btn-outline { background: #fff; border: 1.5px solid #ccc; color: #555; }
        .btn-outline:hover { background: #f4f4f4; color: #111; }
        .btn-warning-modern { background: #ffc107; color: #000; box-shadow: 0 4px 12px rgba(255,193,7,0.3); }

        /* Para JS Validator */
        .was-validated .form-control-custom:invalid { border-color: #dc3545; }
    </style>
</head>

<body class="budget-form-page">
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="page-hero">
    <div class="page-label">Valoración</div>
    <h1><i class="bi bi-calculator"></i> <span th:text="#{msg.budget-form.title}">Generar Presupuesto</span></h1>
</div>

<main class="form-main">
    <div th:if="${error}" class="alert alert-danger mb-4 rounded-3 fw-medium shadow-sm"><i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span></div>

    <div class="custom-card">
        <form th:action="@{/budgets/new}" th:object="${budget}" method="post" id="budgetForm" class="needs-validation" novalidate>
            <input type="hidden" th:field="*{repairId}" />

            <div class="mb-4">
                <label for="totalGross" class="form-label">Total Bruto</label>
                <div class="input-group-custom">
                    <i class="bi bi-currency-euro"></i>
                    <input type="number" step="0.01" min="0" th:field="*{totalGross}" id="totalGross" class="form-control-custom" required
                           th:classappend="${#fields.hasErrors('totalGross')} ? 'is-invalid'" placeholder="Ej: 100.00"/>
                </div>
                <div class="invalid-feedback" style="display:none;">Introduce un importe bruto válido.</div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalGross')}" th:errors="*{totalGross}" style="display:block;"></div>
            </div>

            <div class="mb-5">
                <label for="totalNet" class="form-label text-primary" th:text="#{msg.budget-detail.total}">Total a pagar (con IVA)</label>
                <div class="input-group-custom">
                    <i class="bi bi-currency-euro text-primary"></i>
                    <input type="number" step="0.01" min="0" th:field="*{totalNet}" id="totalNet" class="form-control-custom" required
                           th:classappend="${#fields.hasErrors('totalNet')} ? 'is-invalid'" placeholder="Ej: 121.00"/>
                </div>
                <div class="invalid-feedback" style="display:none;">Introduce el total neto final.</div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalNet')}" th:errors="*{totalNet}" style="display:block;"></div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                <a th:href="@{/repairs/{id}(id=*{repairId})}" class="btn-modern btn-outline">Cancelar</a>
                <button type="submit" class="btn-modern btn-warning-modern">
                    <i class="bi bi-save"></i> Guardar Presupuesto
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
<style>
    .was-validated .form-control-custom:invalid ~ .invalid-feedback { display: block !important; }
</style>
</body>
</html>
