<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.budget-form.title})}"></head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/header :: header}"></header>

<main class="form-page">
    <div class="form-card" style="max-width: 600px;">
        <h1 th:text="#{msg.budget-form.title}">Generar Presupuesto</h1>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/budgets/new}" th:object="${budget}" method="post">
            <input type="hidden" th:field="*{repairId}" />

            <div class="mb-3">
                <label for="totalGross" class="form-label">Total Bruto (€)</label>
                <input type="number" step="0.01" th:field="*{totalGross}" id="totalGross" class="form-control"
                       th:classappend="${#fields.hasErrors('totalGross')} ? 'is-invalid'" placeholder="Ej: 100.00"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalGross')}" th:errors="*{totalGross}"></div>
            </div>

            <div class="mb-3">
                <label for="totalNet" class="form-label" th:text="#{msg.budget-detail.total}">Total a pagar (con IVA)</label>
                <input type="number" step="0.01" th:field="*{totalNet}" id="totalNet" class="form-control"
                       th:classappend="${#fields.hasErrors('totalNet')} ? 'is-invalid'" placeholder="Ej: 121.00"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('totalNet')}" th:errors="*{totalNet}"></div>
            </div>

            <div class="mt-4 d-flex justify-content-between">
                <a th:href="@{/repairs/{id}(id=*{repairId})}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Presupuesto</button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
