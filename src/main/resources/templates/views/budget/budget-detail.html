<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{msg.budget-detail.title}">Tu Presupuesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/views.css}"/>
</head>

<body class="budget-page">
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="page-hero">
    <div class="page-label">Desglose Económico</div>
    <h1><i class="bi bi-receipt"></i> <span th:text="#{msg.budget-detail.title}">Tu Presupuesto</span></h1>
</div>

<main class="budget-main">
    <div th:if="${success}" class="alert alert-success alert-custom shadow-sm"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger alert-custom shadow-sm"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>

    <div class="receipt-card">

        <div class="receipt-top">
            <div th:if="${budget.accepted}" class="status-badge-lg status-accepted">
                <i class="bi bi-check-circle-fill"></i> <span th:text="#{msg.budget-detail.accepted}">Estado: Aceptado</span>
            </div>
            <div th:unless="${budget.accepted}" class="status-badge-lg status-pending">
                <i class="bi bi-clock-history"></i> <span th:text="#{msg.budget-detail.pending}">Estado: Pendiente de aprobación</span>
            </div>
        </div>

        <div class="receipt-body">
            <div class="receipt-row">
                <span class="text-muted fw-semibold">ID Reparación:</span>
                <span class="fw-bold bg-light px-2 py-1 rounded border" th:text="'#' + ${budget.repairId}"></span>
            </div>

            <div class="receipt-row mt-4">
                <span class="text-muted">Total Bruto:</span>
                <span class="fw-semibold" th:text="${budget.totalGross + ' €'}"></span>
            </div>

            <div class="receipt-row mt-2">
                <span class="text-muted">Impuestos (IVA):</span>
                <span class="fw-semibold text-muted" th:text="${#numbers.formatDecimal(budget.totalNet - budget.totalGross, 1, 2)} + ' €'"></span>
            </div>

            <div class="receipt-row total">
                <span th:text="#{msg.budget-detail.total}">Total a pagar:</span>
                <span class="total-price" th:text="${budget.totalNet + ' €'}"></span>
            </div>
        </div>

        <div class="receipt-footer">
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/appointments}" class="btn-modern btn-outline">
                <i class="bi bi-arrow-left"></i> Volver a mis citas
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/repairs/{id}(id=${budget.repairId})}" class="btn-modern btn-outline">
                <i class="bi bi-arrow-left"></i> Volver a la Reparación
            </a>

            <form th:if="${!budget.accepted}" sec:authorize="hasRole('CLIENT')"
                  th:action="@{/budgets/{id}/accept(id=${budget.id})}" method="post">
                <button type="submit" class="btn-modern btn-success-modern">
                    <i class="bi bi-check-lg"></i> <span th:text="#{msg.budget.action.accept}">Aceptar Presupuesto</span>
                </button>
            </form>

            <form th:if="${!budget.accepted}" sec:authorize="hasRole('CLIENT')"
                  th:action="@{/budgets/{id}/reject(id=${budget.id})}" method="post"
                  onsubmit="return confirm('¿Seguro que quieres rechazar el presupuesto? El taller tendrá que hacer uno nuevo.');">
                <button type="submit" class="btn-modern btn-danger-modern">
                    <i class="bi bi-x-lg"></i> Rechazar
                </button>
            </form>
        </div>

    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
