<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{msg.budget-detail.title}">Tu Presupuesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body.budget-page { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; min-height: 100vh; }
        .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO */
        .page-hero { padding: calc(4rem + 64px) 2.5rem 5rem; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); position: relative; overflow: hidden; text-align: center;}
        .page-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #0dcaf0; margin-bottom: 0.5rem; }
        .page-hero h1 { font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

        /* RECEIPT CARD */
        .budget-main { max-width: 600px; margin: -2.5rem auto 5rem; padding: 0 1.5rem; animation: fadeUp 0.5s ease both; position: relative; z-index: 10; }
        .receipt-card { background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); overflow: hidden; }

        .receipt-top { background: #fafafa; padding: 2rem; border-bottom: 2px dashed #e0e0e0; text-align: center; }
        .status-badge-lg { display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 700; padding: 0.6rem 1.2rem; border-radius: 30px; font-size: 0.9rem;}
        .status-accepted { background: rgba(25,135,84,0.1); color: #198754; border: 1px solid rgba(25,135,84,0.3); }
        .status-pending { background: rgba(255,193,7,0.1); color: #b8860b; border: 1px solid rgba(255,193,7,0.3); }

        .receipt-body { padding: 2.5rem 2rem; }
        .receipt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 1.05rem; color: #555; }
        .receipt-row.total { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1.5px solid #eee; font-size: 1.4rem; font-weight: 800; color: #111; }
        .total-price { color: #0dcaf0; font-size: 1.8rem; }

        .receipt-footer { padding: 1.5rem 2rem; background: #fff; border-top: 1px solid #f0f0f0; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }

        /* MODERN BUTTONS */
        .btn-modern { border-radius: 8px; padding: 0.7rem 1.4rem; font-weight: 600; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.15s, box-shadow 0.15s; border: none; cursor: pointer; text-decoration: none;}
        .btn-modern:hover { transform: translateY(-2px); }
        .btn-outline { background: #fff; border: 1.5px solid #ccc; color: #555; }
        .btn-outline:hover { background: #f4f4f4; color: #111; }
        .btn-success-modern { background: #198754; color: #fff; box-shadow: 0 4px 12px rgba(25,135,84,0.3); }
        .btn-danger-modern { background: #dc3545; color: #fff; box-shadow: 0 4px 12px rgba(220,53,69,0.3); }

        .alert-custom { border-radius: 12px; margin-bottom: 1.5rem; font-weight: 500;}
    </style>
</head>

<body class="budget-page">
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="page-hero">
    <div class="page-label">Desglose Económico</div>
    <h1><i class="bi bi-receipt"></i> <span th:text="#{msg.budget-detail.title}">Tu Presupuesto</span></h1>
</div>

<main class="budget-main">
    <div th:if="${success}" class="alert alert-success alert-custom shadow-sm"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger alert-custom shadow-sm"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>

    <div class="receipt-card">

        <div class="receipt-top">
            <div th:if="${budget.accepted}" class="status-badge-lg status-accepted">
                <i class="bi bi-check-circle-fill"></i> <span th:text="#{msg.budget-detail.accepted}">Estado: Aceptado</span>
            </div>
            <div th:unless="${budget.accepted}" class="status-badge-lg status-pending">
                <i class="bi bi-clock-history"></i> <span th:text="#{msg.budget-detail.pending}">Estado: Pendiente de aprobación</span>
            </div>
        </div>

        <div class="receipt-body">
            <div class="receipt-row">
                <span class="text-muted fw-semibold">ID Reparación:</span>
                <span class="fw-bold bg-light px-2 py-1 rounded border" th:text="'#' + ${budget.repairId}"></span>
            </div>

            <div class="receipt-row mt-4">
                <span class="text-muted">Total Bruto:</span>
                <span class="fw-semibold" th:text="${budget.totalGross + ' €'}"></span>
            </div>

            <div class="receipt-row mt-2">
                <span class="text-muted">Impuestos (IVA):</span>
                <span class="fw-semibold text-muted" th:text="${#numbers.formatDecimal(budget.totalNet - budget.totalGross, 1, 2)} + ' €'"></span>
            </div>

            <div class="receipt-row total">
                <span th:text="#{msg.budget-detail.total}">Total a pagar:</span>
                <span class="total-price" th:text="${budget.totalNet + ' €'}"></span>
            </div>
        </div>

        <div class="receipt-footer">
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/appointments}" class="btn-modern btn-outline">
                <i class="bi bi-arrow-left"></i> Volver a mis citas
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/repairs/{id}(id=${budget.repairId})}" class="btn-modern btn-outline">
                <i class="bi bi-arrow-left"></i> Volver a la Reparación
            </a>

            <form th:if="${!budget.accepted}" sec:authorize="hasRole('CLIENT')"
                  th:action="@{/budgets/{id}/accept(id=${budget.id})}" method="post">
                <button type="submit" class="btn-modern btn-success-modern">
                    <i class="bi bi-check-lg"></i> <span th:text="#{msg.budget.action.accept}">Aceptar Presupuesto</span>
                </button>
            </form>

            <form th:if="${!budget.accepted}" sec:authorize="hasRole('CLIENT')"
                  th:action="@{/budgets/{id}/reject(id=${budget.id})}" method="post"
                  onsubmit="return confirm('¿Seguro que quieres rechazar el presupuesto? El taller tendrá que hacer uno nuevo.');">
                <button type="submit" class="btn-modern btn-danger-modern">
                    <i class="bi bi-x-lg"></i> Rechazar
                </button>
            </form>
        </div>

    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
