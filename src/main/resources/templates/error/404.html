<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.title} + ' - 404')}"></head>


<body class="d-flex flex-column h-100">
<header th:replace="fragments/header :: header"></header>


<main class="error-page">
    <section class="error-shell" data-code="404">
        <span class="hero-badge"><i class="bi bi-signpost-split"></i> Ruta no encontrada</span>
        <h1>La pagina que buscas no existe o ya no esta disponible.</h1>
        <p>Vuelve al panel principal o regresa a la vista anterior para seguir trabajando sin perder el contexto.</p>

        <div class="error-actions">
            <a class="btn btn-primary" th:href="@{/}">Ir al inicio</a>
            <a class="btn btn-secondary" href="javascript:history.back()">Volver</a>
        </div>
    </section>
</main>


<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
