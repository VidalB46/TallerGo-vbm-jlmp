<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TallerGO — 403 Acceso Denegado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <th:block th:replace="~{fragments/navbar :: navbarCss}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f4f4f6; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
        /* Forzar navbar oscuro — no hay hero negro debajo */
        .tgo-nav { background: rgba(10,10,10,0.93) !important; backdrop-filter: blur(18px); box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
        .error-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 4rem; }
        .error-card { background: #fff; border: 1.5px solid rgba(0,0,0,0.07); border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); padding: 3rem 2.5rem; max-width: 520px; width: 100%; text-align: center; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .error-code { font-size: 6rem; font-weight: 900; color: #c0392b; line-height: 1; letter-spacing: -4px; }
        .error-title { font-size: 1.4rem; font-weight: 800; color: #111; margin-top: 0.5rem; }
        .error-desc { font-size: 0.9rem; color: #666; margin-top: 0.75rem; line-height: 1.6; }
        .error-meta { margin-top: 1.5rem; background: #f8f8fa; border-radius: 12px; padding: 0.9rem 1.2rem; font-size: 0.78rem; color: #999; text-align: left; }
        .error-meta span { color: #444; font-weight: 600; }
        .error-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
        .btn-home { display: inline-flex; align-items: center; gap: 0.4rem; background: #111; color: #fff; font-size: 0.87rem; font-weight: 700; padding: 0.7rem 1.5rem; border-radius: 12px; text-decoration: none; transition: background 0.2s; }
        .btn-home:hover { background: #c0392b; }
        .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; background: #f0f0f2; color: #555; font-size: 0.87rem; font-weight: 600; padding: 0.7rem 1.4rem; border-radius: 12px; text-decoration: none; border: 1.5px solid #e0e0e0; transition: background 0.2s; }
        .btn-back:hover { background: #e4e4e6; color: #111; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="error-wrap">
    <div class="error-card">
        <div class="error-code">403</div>
        <div class="error-title">Acceso denegado</div>
        <p class="error-desc">No tienes permisos para acceder a este recurso.<br>Si crees que es un error, contacta con el administrador.</p>
        <div class="error-meta">
            <div><span>Ruta:</span> <span th:text="${path}">/ruta</span></div>
            <div style="margin-top:0.3rem"><span>Fecha:</span> <span th:text="${timestamp}">timestamp</span></div>
        </div>
        <div class="error-actions">
            <a th:href="@{/}" class="btn-home"><i class="bi bi-house-fill"></i> Volver al inicio</a>
            <a href="javascript:history.back()" class="btn-back"><i class="bi bi-arrow-left"></i> Volver atrás</a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>


</body>
</html>
