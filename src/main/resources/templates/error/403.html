<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.title} + ' - 403')}"></head>


<body class="d-flex flex-column h-100">


<header th:replace="fragments/header :: header"></header>


<main class="error-page">
    <section class="error-shell" data-code="403">
        <span class="hero-badge"><i class="bi bi-shield-lock"></i> Acceso restringido</span>
        <h1>No tienes permisos para entrar en esta seccion.</h1>
        <p>Comprueba tus credenciales o vuelve a una zona valida de la aplicacion. Si esto no deberia ocurrir, revisa tus permisos.</p>

        <div class="error-actions">
            <a class="btn btn-primary" th:href="@{/}">Volver al inicio</a>
            <a class="btn btn-secondary" href="javascript:history.back()">Volver atras</a>
        </div>

        <div class="error-meta">
            <div><strong>Ruta:</strong> <span th:text="${path}">/ruta</span></div>
            <div><strong>Fecha:</strong> <span th:text="${timestamp}">timestamp</span></div>
        </div>
    </section>
</main>


<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>


</body>
</html>
