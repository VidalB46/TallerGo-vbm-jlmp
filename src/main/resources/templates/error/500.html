<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.title} + ' - Error')}"></head>


<body class="d-flex flex-column h-100">
<header th:replace="fragments/header :: header"></header>


<main class="error-page">
    <section class="error-shell" data-code="500">
        <span class="hero-badge"><i class="bi bi-exclamation-octagon"></i> Incidencia interna</span>
        <h1>Ha ocurrido un error mientras se procesaba la solicitud.</h1>
        <p th:text="${message} ?: 'El sistema no ha podido completar la operacion en este momento.'">Mensaje</p>

        <div class="alert alert-danger mt-4 mb-0 text-start">
            <strong>Codigo:</strong> <span th:text="${status}">500</span><br>
            <strong>Motivo:</strong> <span th:text="${error}">Internal Server Error</span>
        </div>

        <div class="error-actions">
            <a class="btn btn-primary" th:href="@{/}">Ir al inicio</a>
            <a class="btn btn-secondary" href="javascript:history.back()">Volver</a>
        </div>

        <div class="error-meta">
            <div><strong>Ruta:</strong> <span th:text="${path}">/ruta</span></div>
            <div><strong>Fecha:</strong> <span th:text="${timestamp}">timestamp</span></div>
        </div>
    </section>
</main>


<footer th:replace="fragments/footer :: footer"></footer>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
