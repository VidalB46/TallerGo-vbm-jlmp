<footer th:fragment="footer"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        style="
            background: #0a0a0a;
            color: #555;
            padding: 2.8rem 2rem 1.5rem;
            border-top: 1px solid #1e1e1e;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            width: 100%;
            display: block;
        ">

    <div style="
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.8fr 1fr 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        ">

        <div>
            <div style="font-size:1.2rem; font-weight:800; color:#fff; letter-spacing:1.5px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.2rem;">
                TallerGO<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#c0392b;margin-bottom:2px;margin-left:1px;"></span>
            </div>
            <p style="font-size:0.82rem; color:#444; line-height:1.7; max-width:240px;">
                Simplificando la gestión de tu taller, conectando conductores con profesionales de confianza.
            </p>
        </div>

        <div>
            <h4 style="color:#fff; font-size:0.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem;">Navegación</h4>
            <a th:href="@{/}"         style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Inicio</a>
            <a th:href="@{/workshops}" style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Talleres</a>

            <a sec:authorize="hasAnyRole('ADMIN', 'JEFE_TALLER')" th:href="@{/mechanics}" style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Mecánicos</a>
        </div>

        <div>
            <h4 style="color:#fff; font-size:0.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem;">Legal</h4>
            <a href="#" style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Política de Privacidad</a>
            <a href="#" style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Términos de uso</a>
        </div>

        <div>
            <h4 style="color:#fff; font-size:0.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem;">Contacto</h4>
            <a href="mailto:tallerGO@gmail.com" style="color:#555; font-size:0.82rem; text-decoration:none; display:block; line-height:2.1;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">tallerGO@gmail.com</a>
        </div>

    </div>

    <div style="
            max-width: 1100px;
            margin: 0 auto;
            border-top: 1px solid #1a1a1a;
            padding-top: 1.2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #2e2e2e;
        ">
        &copy; 2026 TallerGO &mdash; Todos los derechos reservados.
    </div>

</footer>
