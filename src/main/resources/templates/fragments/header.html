<header th:fragment="header" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}" th:text="#{msg.title}">Taller Go</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                    aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}" th:text="#{msg.nav.home}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mechanics}" th:text="#{msg.nav.mecanicos}">Mecánicos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/workshops}" th:text="#{msg.nav.workshops}">Talleres</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/brands}" th:text="#{msg.header.brands}">Marcas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/vehicles}" th:text="#{msg.header.vehicles}">Vehículos</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-warning" th:href="@{/users}" th:text="#{msg.header.users}">Usuarios</a>
                    </li>
                </ul>

                <form method="get" class="d-flex align-items-center me-3" th:action="@{/}">
                    <select id="langSelect" name="lang" class="form-select form-select-sm" onchange="this.form.submit()">
                        <option value="es" th:selected="${#locale.language == 'es'}">ES</option>
                        <option value="en" th:selected="${#locale.language == 'en'}">EN</option>
                    </select>
                </form>

                <div class="dropdown text-end" sec:authorize="isAuthenticated()">
                    <a href="#" class="d-block link-light text-decoration-none dropdown-toggle"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="small me-2" sec:authentication="name">usuario@email.com</span>
                        <img th:src="@{/images/avatar.svg}" alt="avatar" width="32" height="32" class="rounded-circle border">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                        <li><a class="dropdown-item" th:href="@{/profile/edit}" th:text="#{menu.editProfile}">Perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" th:href="@{/logout}" th:text="#{menu.logout}">Salir</a>
                        </li>
                    </ul>
                </div>

                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm" th:text="#{spring.security.ui.login.submit}">Entrar</a>
                </div>

            </div>
        </div>
    </nav>
</header>
