<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<!--
  Fragment: navbar
  Uso: <nav th:replace="~{fragments/navbar :: navbar(activeLink='workshops')}"></nav>
  Parámetros:
    - activeLink : 'home' | 'workshops' | 'mechanics' | '' (ninguno marcado)
-->
<nav th:fragment="navbar(activeLink)"
     class="tgo-nav" id="tgoNav"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

    <!-- Logo -->
    <a th:href="@{/}" class="tgo-brand">
        TallerGO<span class="tgo-brand-dot"></span>
    </a>

    <!-- Links centrales -->
    <ul class="tgo-links">
        <li>
            <a th:href="@{/}"
               th:classappend="${activeLink == 'home'} ? ' tgo-active'">
                Inicio
            </a>
        </li>
        <li>
            <a th:href="@{/workshops}"
               th:classappend="${activeLink == 'workshops'} ? ' tgo-active'">
                Talleres
            </a>
        </li>
        <li>
            <a th:href="@{/mechanics}"
               th:classappend="${activeLink == 'mechanics'} ? ' tgo-active'">
                Mecánicos
            </a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/appointments}">Mis Citas</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/vehicles}">Mis Vehículos</a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/users}" style="color:#f0a0a0;">Admin</a>
        </li>
        <li sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="tgo-cta">Iniciar sesión</a>
        </li>
    </ul>

    <!-- Usuario autenticado -->
    <div class="tgo-user" sec:authorize="isAuthenticated()">
        <i class="bi bi-person-circle"></i>
        <span class="tgo-username" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Salir</button>
        </form>
    </div>

</nav>

<!--
  Bloque de CSS del navbar — incluirlo UNA VEZ en el <head> de cada página
  Uso: <style th:replace="~{fragments/navbar :: navbarCss}"></style>
-->
<th:block th:fragment="navbarCss">
<style>
/* ════════════════════════════════════════
   NAVBAR COMPARTIDO — TallerGO
════════════════════════════════════════ */
.tgo-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    padding: 0.9rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s ease, box-shadow 0.4s ease, padding 0.3s ease;
}
.tgo-nav.scrolled {
    background: rgba(10,10,10,0.93);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    padding: 0.6rem 2.5rem;
}

/* Logo */
.tgo-brand {
    font-size: 1.4rem;
    font-weight: 900;
    color: #fff;
    text-decoration: none;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    flex-shrink: 0;
}
.tgo-brand-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #c0392b;
    margin-bottom: 2px;
    animation: pulse-red 2.2s infinite;
}
@keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.55); }
    50%       { box-shadow: 0 0 0 6px rgba(192,57,43,0); }
}

/* Links */
.tgo-links {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    list-style: none;
    margin: 0; padding: 0;
}
.tgo-links a,
.tgo-links button {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
}
.tgo-links a:hover,
.tgo-links button:hover {
    color: #fff;
    background: rgba(255,255,255,0.09);
}
.tgo-links a.tgo-active {
    color: #fff;
    font-weight: 700;
    background: rgba(255,255,255,0.07);
}
.tgo-links .tgo-cta {
    background: #c0392b;
    color: #fff !important;
    font-weight: 600;
    padding: 0.45rem 1.1rem;
    border-radius: 8px;
    box-shadow: 0 3px 12px rgba(192,57,43,0.35);
}
.tgo-links .tgo-cta:hover {
    background: #a93226;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(192,57,43,0.45);
}

/* Usuario */
.tgo-user {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.83rem;
    color: rgba(255,255,255,0.65);
    flex-shrink: 0;
}
.tgo-username {
    color: #fff;
    font-weight: 600;
}
.tgo-user form button {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.3);
    color: #e88080;
    font-size: 0.8rem;
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.2s, color 0.2s;
}
.tgo-user form button:hover {
    background: #c0392b;
    color: #fff;
    border-color: #c0392b;
}

/* Responsive */
@media (max-width: 900px) {
    .tgo-nav { padding: 0.75rem 1.2rem; }
    .tgo-nav.scrolled { padding: 0.5rem 1.2rem; }
    .tgo-links a, .tgo-links button { font-size: 0.78rem; padding: 0.38rem 0.6rem; }
    .tgo-username { display: none; }
}
@media (max-width: 640px) {
    .tgo-links li:not(:has(.tgo-cta)):not(:last-child) { display: none; }
}
</style>
</th:block>

</html>
